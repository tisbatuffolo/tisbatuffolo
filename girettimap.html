<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>GirettiMap</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>
    <a href="index.html" class="home-link">Panda Blog</a>
  </h1>

  <p>
    <a href="https://www.outdooractive.com/it/list/girettimap/240115709" target="_blank">
      Vai alla raccolta completa su Outdooractive
    </a>
  </p>
</header>

<main>

  <h2 style="text-align: center; margin-top: 20px;">
    Ultimi Giri
  </h2>

  <div class="grid-riquadri" id="contenitore-giri"></div>

</main>

<footer>
  © 2026 Panda Blog
</footer>

<script>
fetch("giri.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("contenitore-giri");

    data.forEach(giro => {
      const card = document.createElement("div");
      card.className = "riquadro";

      card.innerHTML = `
        <a href="${giro.link}" target="_blank" class="riquadro-link">
          <img src="${giro.img}" alt="${giro.titolo}">
          <div class="riquadro-titolo">${giro.titolo}</div>
        </a>
      `;

      container.appendChild(card);
    });
  })
  .catch(err => console.error("Errore caricamento giri:", err));
</script>

</body>
</html>
