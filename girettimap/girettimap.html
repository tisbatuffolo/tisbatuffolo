<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GirettiMap</title>
  <link rel="stylesheet" href="../stile.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* --- RESET & BASE --- */
    header h1 a { font-size: 1em !important; color: #2332bb !important; text-decoration: none !important; }

    main h2 {
      text-align: center;
      margin: 35px 0 20px;
      color: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: clamp(1.5em, 5vw, 2.2em);
      font-weight: bold;
    }

    /* --- TOP LINKS --- */
    .top-links {
      display: flex;
      justify-content: center;
      max-width: 1100px;
      margin: 10px auto 30px auto;
      padding: 0 15px;
      gap: 15px;
    }

    .link-box {
      flex: 1;
      padding: 20px 10px;
      border-radius: 15px;
      text-align: center;
      transition: transform 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 160px; 
    }
    .link-box:hover { transform: translateY(-5px); }
    .link-box.map-box { background-color: #d4edda; } 
    .link-box.list-box { background-color: #f8d7da; }

    .link-box a {
      text-decoration: none;
      color: #000000;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: center;
      white-space: nowrap; 
      font-size: clamp(0.75em, 3.2vw, 1.05em); 
    }

    .link-box img { width: 100%; max-width: 110px; height: auto; margin-bottom: 12px; }

    /* --- ULTIMI GIRI --- */
    .grid-riquadri {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto 40px auto;
      padding: 0 15px;
    }

    .riquadro {
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      transition: transform 0.2s ease;
    }
    .riquadro img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .riquadro-titolo { padding: 15px; font-weight: bold; text-align: center; color: #2332bb; background: #f8faff; font-size: 1.1em; }
    .riquadro-link { text-decoration: none; color: inherit; display: block; }

    /* --- CONTAGIRI SECTION --- */
    #contagiri {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 15px;
    }

    #frase-giri {
      font-size: clamp(1em, 4vw, 1.25em);
      line-height: 1.4;
      font-weight: bold;
      text-align: center;
      margin-bottom: 30px;
    }

    /* --- TABELLA OTTIMIZZATA --- */
    .table-container-wrapper {
      width: 100%;
      margin: 0 auto;
    }

    table#tabella-giri {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #fff;
    }

    /* SFONDO BIANCO PER LE ICONE */
    .icon-row td {
      background-color: #ffffff !important; /* Forza lo sfondo bianco */
      border: none !important;
      padding: 20px 5px 10px 5px !important;
      vertical-align: bottom;
    }

    .icon-row img {
      width: 100%;
      max-width: 120px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .header-row th {
      background-color: #2332bb;
      color: white;
      padding: 15px 2px;
      font-size: clamp(0.7em, 2.5vw, 0.9em);
      text-transform: uppercase;
      border: 1px solid #1a27a0;
    }

    #tabella-giri td {
      padding: 12px 2px;
      text-align: center;
      border: 1px solid #eee;
      font-size: clamp(0.9em, 3vw, 1.1em);
    }

    /* --- TREND  */
    /* Container Legenda Trend - Compatto e su una riga */
    #trend-legend-custom {
      display: flex;
      flex-wrap: nowrap; /* Forza su una riga sola */
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      overflow-x: auto; /* Permette lo scroll se lo schermo è mini */
      padding: 5px 0;
    }

    /* Badge più piccoli e sottili */
    .legend-badge {
      padding: 4px 10px; /* Ridotto */
      border-radius: 6px;
      color: white;
      font-weight: bold;
      font-size: 0.75em; /* Testo più piccolo */
      white-space: nowrap; /* Evita che il testo vada a capo nel badge */
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0; /* Impedisce ai badge di restringersi troppo */
    }

    .legend-badge.hidden {
      opacity: 0.2;
      background-color: #ddd !important;
      color: #888;
    }

    /* Fix per il contenitore del grafico per evitare sovrapposizioni */
    .charts-vertical-stack { 
      margin-bottom: 20px; 
    }
    
    .chart-wrapper { 
      height: 300px; /* Leggermente ridotto per dare respiro */
      margin-bottom: 60px; /* Spazio extra per i badge sotto */
    }

    /* --- TORTA --- */

    .torta-container {
      background: #fff;
      padding: 25px 15px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      width: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }

    .torta-wrapper { width: 100%; max-width: 320px; height: 320px; }

    #grid-legend {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      width: 100%;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .legend-item { font-size: 0.85em; display: flex; align-items: center; gap: 8px; }
    .color-box { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    .filter-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .anno-item {
      background: #f0f4ff;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 0.9em;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .footer-banner {
      background-color: #e3f2fd;
      padding: 25px;
      border-radius: 15px;
      max-width: 1100px;
      margin: 40px auto;
      text-align: center;
    }

    @media (max-width: 600px) {
      .grid-riquadri, #contagiri, .top-links {
        padding-left: 5px !important;
        padding-right: 5px !important;
      }
      .icon-row img { max-width: 75px; }
      #grid-legend { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>

<body>

<header>
  <h1><a href="../index.html">SbatuffoBlog</a><span> - Giretti</span></h1>
</header>

<main>
  <section class="top-links">
    <div class="link-box map-box">
      <a href="https://www.outdooractive.com/it/list/girettimap/240115709" target="_blank">
        <img src="img/pandamappa.png" alt="Mappa">
        <span>Accedi alla GirettiMap</span>
      </a>
    </div>
    <div class="link-box list-box">
      <a href="https://docs.google.com/spreadsheets/d/15UmyRWaW0getdRevefWd1xHUEjXKS36IUtUXFqK_0ds/edit?usp=drivesdk" target="_blank">
        <img src="img/pandalista.png" alt="Lista">
        <span>Accedi alla GirettiList</span>
      </a>
    </div>
  </section>

  <h2>Ultimi Giri</h2>
  <div class="grid-riquadri" id="contenitore-giri"></div>

  <section id="contagiri">
    <h2>Conta Giri</h2>
    <p id="frase-giri"></p>

    <div class="table-container-wrapper">
      <table id="tabella-giri">
        <thead>
          <tr class="icon-row">
            <td style="width: 16%"></td>
            <td><img src="img/giriinsieme.png" alt=""></td>
            <td><img src="img/giretti.png" alt=""></td>
            <td><img src="img/girilunghi.png" alt=""></td>
            <td><img src="img/giriamici.png" alt=""></td>
          </tr>
          <tr class="header-row">
            <th>Anno</th>
            <th>Insieme</th>
            <th>Giretti</th>
            <th>Lunghi</th>
            <th>Amici</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="charts-vertical-stack">
      <div class="chart-wrapper">
        <canvas id="chartTrend"></canvas>
        <div id="trend-legend-custom"></div>
      </div>
    </div>

    <div class="torta-container">
      <h3>Torta dei Giretti 🍰 </h3>
      <div class="filter-area">
        <div class="anno-item">
          <input type="checkbox" id="selectAll" checked>
          <label for="selectAll">TUTTI</label>
        </div>
        <div id="lista-checkbox-anni" style="display: contents;"></div>
      </div>
      <div class="torta-wrapper">
        <canvas id="chartTorta"></canvas>
      </div>
      <div id="grid-legend"></div>
    </div>
  </section>

  <div class="footer-banner">
    <h2 style="margin: 0;">Solo posti nuovi e tutti giri belli!</h2>
  </div>
</main>

<script src="giri.js"></script>

<script>

const container = document.getElementById("contenitore-giri");
if (typeof GIRI !== 'undefined') {
  GIRI.slice(0, 9).forEach(giro => {
    const card = document.createElement("div");
    card.className = "riquadro";
    const imgSrc = giro.img && giro.img !== "" ? giro.img : "https://via.placeholder.com/800x600?text=No+Image";
    card.innerHTML = `<a href="${giro.link}" target="_blank" class="riquadro-link"><div class="riquadro-titolo">${giro.titolo}</div><img src="${imgSrc}" alt="${giro.titolo}"></a>`;
    container.appendChild(card);
  });
}

const BASE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS25gFAneadaRaQQHKaNq-dZLFD0dx1mQw5nxZj7fHc2XWZH6zxHn8A4rRgPJ_XH5eujTrhTr6x36vq/pub?output=csv&gid=";
const SHEETS = { 2018: 0, 2019: 1139420899, 2020: 2024853702, 2021: 1564840008, 2022: 1211406438, 2023: 47473263, 2024: 203674235, 2025: 1106825116, 2026: 232828694 };

let datiPerAnno = {}; 
let chartTortaObj = null;
const paletteColori = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#FF63FF', '#C9CBCF', '#45f542', '#f54242', '#42f5f5', '#f5a442'];

function parseCSV(text) { return text.trim().split("\n").map(r => r.split(",").map(c => c.replace(/^"|"$/g, "").trim())); }
function parseDate(str) { const [y, m, d] = str.split("/").map(Number); return new Date(y, m - 1, d); }

async function init() {
  const anniOrdinati = Object.keys(SHEETS).sort((a, b) => a - b);
  const containerAnni = document.getElementById("lista-checkbox-anni");
  let ultimaData = null;

  await Promise.all(anniOrdinati.map(async (anno) => {
    try {
      const res = await fetch(BASE_CSV + SHEETS[anno]);
      const csv = await res.text();
      const rows = parseCSV(csv).slice(1);
      let tot = rows.length, giretti = 0, lunghi = 0, amici = 0, tipi = {};
      rows.forEach(r => {
        const giorni = r[2], amiciCol = (r[3] || "").toUpperCase(), tipo = (r[6] || "Altro").trim() || "Altro";
        tipi[tipo] = (tipi[tipo] || 0) + 1;
        if (giorni === "1" || giorni === "1/2") giretti++; else if (parseFloat(giorni) > 1) lunghi++;
        if (amiciCol === "SI") amici++;
        if (r[0]) { const d = parseDate(r[0]); if (!ultimaData || d > ultimaData) ultimaData = d; }
      });
      datiPerAnno[anno] = { tot, giretti, lunghi, amici, tipi };
    } catch (e) { console.error(e); }
  }));

  anniOrdinati.slice().reverse().forEach(anno => {
    if(datiPerAnno[anno]) {
      const item = document.createElement("div");
      item.className = "anno-item";
      item.innerHTML = `<input type="checkbox" class="anno-cb" value="${anno}" checked id="cb-${anno}"><label for="cb-${anno}">${anno}</label>`;
      containerAnni.appendChild(item);
    }
  });

  const tbody = document.querySelector("#tabella-giri tbody");
  const summary = { anni: [], totali: [], giretti: [], lunghi: [], amici: [] };
  [...anniOrdinati].reverse().forEach(anno => {
    const d = datiPerAnno[anno];
    if(d) {
      summary.anni.push(anno); summary.totali.push(d.tot); summary.giretti.push(d.giretti); summary.lunghi.push(d.lunghi); summary.amici.push(d.amici);
      tbody.innerHTML += `<tr><td>${anno}</td><td>${d.tot}</td><td>${d.giretti}</td><td>${d.lunghi}</td><td>${d.amici}</td></tr>`;
    }
  });

  renderTrend(summary);
  updateTorta();
  
  document.querySelectorAll('.anno-cb').forEach(cb => cb.addEventListener('change', updateTorta));
  document.getElementById('selectAll').addEventListener('change', (e) => {
    document.querySelectorAll('.anno-cb').forEach(cb => cb.checked = e.target.checked);
    updateTorta();
  });

  if (ultimaData) {
    const diff = Math.floor((new Date().setHours(0,0,0,0) - new Date(ultimaData).setHours(0,0,0,0)) / 86400000);
    const el = document.getElementById("frase-giri");
    if (diff === 0) { el.innerText = "Che bello oggi abbiamo fatto un giro insieme!"; el.style.color = "green"; }
    else if (diff === 1) { el.innerText = "Che bello ieri abbiamo fatto un giro insieme!"; el.style.color = "green"; }
    else if (diff <= 6) { el.innerText = "Che bello questa settimana abbiamo fatto un giro insieme!"; el.style.color = "green"; }
    else { el.innerText = `Sono ben ${diff} giorni che non facciamo un giro insieme!`; el.style.color = "#d32f2f"; }
  }
}

function updateTorta() {
  const selectedAnni = Array.from(document.querySelectorAll('.anno-cb:checked')).map(cb => cb.value);
  let aggregatoTipi = {};
  selectedAnni.forEach(anno => {
    if(datiPerAnno[anno]) {
      const tipi = datiPerAnno[anno].tipi;
      for (let t in tipi) { aggregatoTipi[t] = (aggregatoTipi[t] || 0) + tipi[t]; }
    }
  });
  const labels = Object.keys(aggregatoTipi), valori = Object.values(aggregatoTipi);
  const ctx = document.getElementById('chartTorta').getContext('2d');
  if (chartTortaObj) chartTortaObj.destroy();
  chartTortaObj = new Chart(ctx, {
    type: 'pie',
    data: { labels: labels, datasets: [{ data: valori, backgroundColor: paletteColori, borderWidth: 1 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
  const legendGrid = document.getElementById('grid-legend');
  legendGrid.innerHTML = '';
  labels.forEach((l, i) => {
    legendGrid.innerHTML += `<div class="legend-item"><div class="color-box" style="background:${paletteColori[i % paletteColori.length]}"></div><span>${l}: <strong>${valori[i]}</strong></span></div>`;
  });
}

function renderTrend(data) {
  const ctxTrend = document.getElementById('chartTrend').getContext('2d');
  
  const datasets = [
    { label: 'Insieme', data: data.totali.slice().reverse(), color: '#2332bb', width: 3 },
    { label: 'Giretti', data: data.giretti.slice().reverse(), color: '#4caf50', width: 2 },
    { label: 'Giri Lunghi', data: data.lunghi.slice().reverse(), color: '#ff9800', width: 2 },
    { label: 'Amici', data: data.amici.slice().reverse(), color: '#e91e63', width: 2 }
  ];

  const chartTrend = new Chart(ctxTrend, {
    type: 'line',
    data: {
      labels: data.anni.slice().reverse(),
      datasets: datasets.map(d => ({
        label: d.label,
        data: d.data,
        borderColor: d.color,
        backgroundColor: d.color,
        tension: 0.3,
        borderWidth: d.width,
        pointRadius: 3
      }))
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: {
        padding: { bottom: 10 } // Spazio interno al canvas
      },
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: { beginAtZero: true }
      }
    }
  });

  const legendContainer = document.getElementById('trend-legend-custom');
  legendContainer.innerHTML = ''; 

  datasets.forEach((d, index) => {
    const badge = document.createElement('div');
    badge.className = 'legend-badge';
    badge.style.backgroundColor = d.color;
    badge.innerText = d.label;

    badge.onclick = () => {
      const isVisible = chartTrend.isDatasetVisible(index);
      if (isVisible) {
        chartTrend.hide(index);
        badge.classList.add('hidden');
      } else {
        chartTrend.show(index);
        badge.classList.remove('hidden');
      }
    };
    legendContainer.appendChild(badge);
  });
}

init();
</script>

</body>
</html>
