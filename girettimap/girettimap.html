<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>GirettiMap</title>
  <link rel="stylesheet" href="../stile.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* 🔥 Modifiche specifiche solo per questa pagina */
    
    /* 1. SbatuffoBlog blu, stessa dimensione di GirettiMap e SENZA sottolineatura */
    header h1 a {
      font-size: 1em !important; 
      color: #2332bb !important;
      text-decoration: none !important; /* Rimuove la sottolineatura di base */
    }

    /* 2. Ripristina la sottolineatura solo al passaggio del mouse (hover) */
    header h1 a:hover {
      text-decoration: underline !important;
    }

    /* Stile per i titoli delle sezioni nel main */
    main h2 {
      text-align: center;
      margin-top: 40px;
      margin-bottom: 20px;
      color: #000000; 
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 2em;
      font-weight: bold;
    }

    .top-links {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      max-width: 1100px;
      margin: 20px auto;
      padding: 0 10px;
    }

    .link-box {
      text-align: center;
      width: 45%;
    }

    .link-box a {
      text-decoration: none;
      color: #2332bb;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .link-box img {
      width: 150px;
      height: auto;
    }

    .chart-wrapper {
      width: 100%;
      max-width: 1100px;
      margin: 30px auto;
      height: 500px;
    }
  </style>
</head>

<body>

<header>
  <h1>
    <a href="../index.html">SbatuffoBlog</a><span> - GirettiMap</span>
  </h1>
</header>

<main>
  <section class="top-links">
    <div class="link-box">
      <a href="https://www.outdooractive.com/it/list/girettimap/240115709" target="_blank">
        <span>Accedi alla GirettiMap</span>
        <img src="img/pandamappa.png" alt="Mappa">
      </a>
    </div>

    <div class="link-box">
      <a href="https://docs.google.com/spreadsheets/d/15UmyRWaW0getdRevefWd1xHUEjXKS36IUtUXFqK_0ds/edit?usp=drivesdk" target="_blank">
        <span>Accedi alla GirettiList</span>
        <img src="img/pandalista.png" alt="Lista">
      </a>
    </div>
  </section>

  <h2>Ultimi Giri</h2>

  <div class="grid-riquadri" id="contenitore-giri"></div>

  <section id="contagiri">
    <h2>Conta Giri</h2>
    <p id="frase-giri" style="font-size: 1.2em; font-weight: bold; color: #d32f2f; text-align: center;"></p>

    <div class="icone-tabella">
      <div></div>
      <div><img src="img/giriinsieme.png" alt="Giri insieme"></div>
      <div><img src="img/giretti.png" alt="Giretti"></div>
      <div><img src="img/girilunghi.png" alt="Giri lunghi"></div>
      <div><img src="img/giriamici.png" alt="Giri amici"></div>
    </div>

    <table id="tabella-giri">
      <thead>
        <tr>
          <th>Anno</th>
          <th>Giri insieme</th>
          <th>Giretti</th>
          <th>Girilunghi</th>
          <th>Giri amici</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="chart-wrapper">
      <canvas id="chartTrend"></canvas>
    </div>
  </section>
</main>

<script src="giri.js"></script>

<script>
/* Logica card "Ultimi Giri" */
const container = document.getElementById("contenitore-giri");
if (typeof GIRI !== 'undefined') {
  GIRI.slice(0, 9).forEach(giro => {
    const card = document.createElement("div");
    card.className = "riquadro";
    const imgSrc = giro.img && giro.img !== "" ? giro.img : "https://via.placeholder.com/800x600?text=No+Image";
    card.innerHTML = `
      <a href="${giro.link}" target="_blank" class="riquadro-link">
        <div class="riquadro-titolo">${giro.titolo}</div>
        <img src="${imgSrc}" alt="${giro.titolo}">
      </a>
    `;
    container.appendChild(card);
  });
}

/* Logica CSV e Grafico */
const BASE_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS25gFAneadaRaQQHKaNq-dZLFD0dx1mQw5nxZj7fHc2XWZH6zxHn8A4rRgPJ_XH5eujTrhTr6x36vq/pub?output=csv&gid=";
const SHEETS = { 2018: 0, 2019: 1139420899, 2020: 2024853702, 2021: 1564840008, 2022: 1211406438, 2023: 47473263, 2024: 203674235, 2025: 1106825116, 2026: 232828694 };

function parseCSV(text) { return text.trim().split("\n").map(r => r.split(",").map(c => c.replace(/^"|"$/g, "").trim())); }
function parseDate(str) { const [y, m, d] = str.split("/").map(Number); return new Date(y, m - 1, d); }

async function contaGiri() {
  const tbody = document.querySelector("#tabella-giri tbody");
  let ultimaData = null;

  const dataGrafico = { anni: [], totali: [], giretti: [], lunghi: [], amici: [] };
  const anni = Object.keys(SHEETS).sort((a, b) => a - b);

  try {
    // 🔥 tutte le fetch insieme
    const promises = anni.map(anno =>
      fetch(BASE_CSV + SHEETS[anno])
        .then(res => res.text())
        .then(csv => ({ anno, rows: parseCSV(csv).slice(1) }))
    );

    const risultati = await Promise.all(promises);

    // 🔥 elaborazione dati
    risultati.forEach(({ anno, rows }) => {
      let tot = rows.length, giretti = 0, girilunghi = 0, amici = 0;

      rows.forEach(r => {
        const giorni = r[2];
        const amiciCol = (r[3] || "").toUpperCase();

        if (giorni === "1" || giorni === "1/2") giretti++;
        else if (parseFloat(giorni) > 1) girilunghi++;
        if (amiciCol === "SI") amici++;

        if (r[0]) {
          const d = parseDate(r[0]);
          if (!ultimaData || d > ultimaData) ultimaData = d;
        }
      });

      dataGrafico.anni.push(anno);
      dataGrafico.totali.push(tot);
      dataGrafico.giretti.push(giretti);
      dataGrafico.lunghi.push(girilunghi);
      dataGrafico.amici.push(amici);
    });

    // 🔥 aggiorna tabella TUTTA INSIEME (molto più veloce)
    const html = risultati.map(({ anno }, i) => `
      <tr>
        <td>${anno}</td>
        <td>${dataGrafico.totali[i]}</td>
        <td>${dataGrafico.giretti[i]}</td>
        <td>${dataGrafico.lunghi[i]}</td>
        <td>${dataGrafico.amici[i]}</td>
      </tr>
    `).reverse().join("");

    tbody.innerHTML = html;

  } catch (e) {
    console.error(e);
  }

  // grafico (uguale al tuo)
  const ctx = document.getElementById('chartTrend').getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: dataGrafico.anni,
      datasets: [
        { label: 'Giri Insieme', data: dataGrafico.totali, borderColor: '#2332bb', tension: 0.2, borderWidth: 4 },
        { label: 'Giretti', data: dataGrafico.giretti, borderColor: '#4caf50', tension: 0.2, borderWidth: 3 },
        { label: 'Giri Lunghi', data: dataGrafico.lunghi, borderColor: '#ff9800', tension: 0.2, borderWidth: 3 },
        { label: 'Giri Amici', data: dataGrafico.amici, borderColor: '#e91e63', tension: 0.2, borderWidth: 3 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });

  if (ultimaData) {
    const diff = Math.floor((new Date() - ultimaData) / 86400000);
    document.getElementById("frase-giri").innerText =
      `Sono ben ${diff} giorni che non facciamo un giro insieme!`;
  }
}

contaGiri();
</script>

</body>
</html>
