<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SbatuffoBlog - PandaAccessori</title>

<link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #f13bd2;; 
  --sbatuffo-blue: #0000ff; 
  --accent: #ff4757;
  --bg-soft: #fdfdfd;
  --text: #1a1a1a;
  --stroke: #1a1a1a;
  --heart-red: #ff4d4d;
}

body { 
    font-family: 'Fredoka', sans-serif; 
    margin: 0; 
    background: var(--bg-soft); 
    color: var(--text); 
    overflow-x: hidden; 
}

/* --- HEADER --- */
header { background: #fff; padding: 25px 10px 5px; text-align: center; }
.header-container { display: flex; justify-content: center; align-items: center; gap: 30px; position: relative; }
.home-link-img { position: absolute; left: 20px; top: 5px; }
.home-link-img img { width: clamp(70px, 12vw, 100px); height: auto; }
.brand-title { font-family: 'Grandstander', cursive; font-weight: 900; font-size: clamp(2.2rem, 8vw, 4.2rem); color: var(--sbatuffo-blue); text-decoration: none; }
.brand-subtitle { font-size: clamp(0.9rem, 3vw, 1.2rem); color: var(--primary); font-weight: 700; margin-top: 5px; text-transform: lowercase; }

/* --- DIVISORE --- */
.section-divider { max-width: 200px; height: 3px; background: var(--primary); margin: 30px auto; border-radius: 50px; position: relative; }
.section-divider::after { content: "♥"; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--bg-soft); padding: 0 15px; color: var(--heart-red); font-size: 1.5rem; }

.container { width: 100%; max-width: 700px; margin: 0 auto; padding: 15px; box-sizing: border-box; min-height: 50vh; }
.section-title { font-family: 'Grandstander', cursive; font-size: 1.9rem; font-weight: 900; margin: 20px 0 30px 0; border-left: 6px solid var(--primary); padding-left: 12px; }


footer { background: #fff; padding: 20px 10px 40px; text-align: center; }
.footer-text { font-family: 'Grandstander', cursive; font-weight: 600; font-size: 1.2rem; color: #444; }
</style>
</head>

<body>
<header>
  <div class="header-container">
    <a href="../index.html" class="home-link-img"><img src="img/home.png" alt="Home"></a>
    <div class="brand-wrapper">
      <a href="../index.html" class="brand-title">SbatuffoBlog</a>
      <div class="brand-subtitle">PandAccessori</div>
    </div>
  </div>
</header>

<div class="section-divider"></div>


<div class="section-divider"></div>

<footer>
    <div class="footer-text">@SbatuffoBlog 2026</div>
</footer>


</body>
</html>
