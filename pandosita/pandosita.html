<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SbatuffoBlog - Pandaccessori</title>
<link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #f13bd2; 
  --sbatuffo-blue: #0000ff; 
  --accent: #ff4757;
  --bg-soft: #ffffff;
  --text: #1a1a1a;
  --heart-red: #ff4d4d;
  --map-grass: #7bed9f;
  --map-road: #57606f;
}

body { font-family: 'Fredoka', sans-serif; margin: 0; background: var(--bg-soft); color: var(--text); overflow-x: hidden; }

/* --- HEADER --- */
header { background: #fff; padding: 15px 30px; border-bottom: 2px solid #f1f1f1; }
.header-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 20px; }
.home-link-img img { width: 60px; height: auto; transition: transform 0.3s; }
.home-link-img img:hover { transform: rotate(-5deg) scale(1.1); }
.brand-group { display: flex; flex-direction: column; }
.brand-title { font-family: 'Grandstander', cursive; font-weight: 900; font-size: 2.8rem; color: var(--sbatuffo-blue); margin: 0; line-height: 1; }
.brand-subtitle { font-size: 1.4rem; color: var(--primary); font-weight: 700; margin: 5px 0 0 0; text-transform: none; }

/* --- SEZIONE TITOLO & CONTEGGIO --- */
.intro-stats { text-align: center; margin: 40px 20px 20px 20px; }
.intro-stats h2 { font-family: 'Grandstander'; font-size: 3rem; color: var(--sbatuffo-blue); margin: 0 0 10px 0; }
.intro-stats p { font-size: 1.5rem; font-weight: 600; color: var(--text); margin: 0; }
.intro-stats span { color: var(--primary); font-size: 2rem; font-weight: 900; }

/* --- DIVISORE NETTO (Linea - Cuore - Linea) --- */
.section-divider { 
    display: flex; align-items: center; justify-content: center; 
    margin: 40px auto; color: var(--heart-red); font-size: 2rem; gap: 15px; 
}
.section-divider::before, .section-divider::after { 
    content: ""; width: 80px; height: 4px; background: var(--primary); border-radius: 2px; 
}

/* --- MAPPA SUPER DETTAGLIATA --- */
.map-outer { background: #a2eafc; padding: 40px 0; perspective: 1000px; }
.map-canvas { 
    position: relative; width: 95%; max-width: 1100px; height: 650px; margin: 0 auto; 
    background: var(--map-grass); border-radius: 50px; border: 12px solid #fff;
    box-shadow: 0 40px 100px rgba(0,0,0,0.2); overflow: hidden;
}

/* Strade, Autobus, Condominio, ecc. (invariati visivamente) */
.m-road { position: absolute; background: var(--map-road); }
.m-road.h { bottom: 120px; left: 0; width: 100%; height: 70px; }
.m-road.h::before { content:''; position:absolute; top:33px; width:100%; border-top: 4px dashed rgba(255,255,255,0.4); }
.m-road.v { top: 0; left: 40%; width: 70px; height: 100%; }
.m-bus { position: absolute; bottom: 135px; width: 60px; height: 30px; background: #f1c40f; border-radius: 6px; border: 2px solid #333; animation: driveBus 20s linear infinite; }
.m-bus::after { content:''; position:absolute; top:5px; left:5px; width:45px; height:10px; background: #81ecec; border-radius: 2px; }
@keyframes driveBus { from { left: -100px; } to { left: 1200px; } }
.m-condo { position: absolute; bottom: 200px; left: 8%; width: 160px; height: 280px; background: #f1f2f6; border: 3px solid #ced4da; border-radius: 8px; box-shadow: 10px 10px 0 rgba(0,0,0,0.1); }
.m-condo .roof { position: absolute; top: -40px; left: -10px; width: 180px; height: 50px; background: #ff4757; clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%); }
.m-condo .balcony { width: 50px; height: 15px; background: #dfe4ea; margin: 20px auto; border: 2px solid #747d8c; position: relative; }
.m-condo .flower { position: absolute; top: -10px; left: 5px; color: #ff6b81; font-size: 12px; }
.m-car-blue { position: absolute; bottom: 100px; left: 12%; width: 70px; height: 35px; background: #0000ff; border-radius: 12px 18px 5px 5px; border: 3px solid #1a1a1a; z-index: 5; }
.m-office { position: absolute; top: 50px; left: 15%; width: 130px; height: 150px; background: #7f8c8d; border: 4px solid #2d3436; }
.m-office .win-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
.m-office .win { background: #81ecec; height: 25px; border: 1px solid #fff; }
.m-hill { position: absolute; top: 40px; right: 5%; width: 350px; height: 250px; background: #2ecc71; border-radius: 50%; box-shadow: inset -20px -20px 60px rgba(0,0,0,0.1); }
.m-house-small { position: absolute; top: 30px; right: 18%; width: 90px; height: 70px; background: #fab1a0; border: 3px solid #e17055; border-radius: 5px; }
.m-car-red { position: absolute; top: 120px; right: 10%; width: 60px; height: 30px; background: #d63031; border-radius: 10px; border: 3px solid #000; }

/* Marker GPS */
.m-pin { position: absolute; text-decoration: none; z-index: 100; transition: 0.3s; }
.m-pin:hover { transform: scale(1.2) translateY(-5px); }
.pin-label { background: var(--primary); color: #fff; padding: 6px 14px; border-radius: 20px; font-weight: 900; border: 2px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 6px; white-space: nowrap; }

/* --- PLANIMETRIA CASA SBATUFFOLONE (Nuovo Layout a 6 stanze) --- */
.plani-box { width: 100%; height: 550px; background: #fdfdfd; border: 6px solid #f1f1f1; border-radius: 30px; position: relative; margin-bottom: 40px; overflow: hidden; }
.p-room { 
    position: absolute; border: 3px solid #ddd; background: rgba(241, 59, 210, 0.05); 
    border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; 
    font-weight: bold; color: #888; font-family: 'Grandstander'; font-size: 1.2rem;
    cursor: pointer; transition: 0.3s;
}
.p-room:hover { background: rgba(241, 59, 210, 0.15); border-color: var(--primary); color: var(--primary); }

.p-salotto { top: 5%; left: 5%; width: 45%; height: 40%; }
.p-cucina { top: 5%; left: 52%; width: 43%; height: 30%; }
.p-bagno { top: 37%; left: 52%; width: 20%; height: 25%; }
.p-terrazzo { top: 37%; left: 74%; width: 21%; height: 25%; }
.p-corridoio { top: 47%; left: 5%; width: 45%; height: 15%; background: #fff5f5; }
.p-lettone { bottom: 5%; left: 5%; width: 90%; height: 30%; }

/* Conta Panda nella stanza */
.room-badge { 
    background: var(--accent); color: #fff; border-radius: 50%; width: 35px; height: 35px;
    display: flex; align-items: center; justify-content: center; margin-top: 10px; font-weight: 900;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 2px solid #fff; font-size: 1rem; font-family: 'Fredoka';
}

/* --- GALLERIA --- */
.section-container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
.gallery-card { background: #fff; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; margin-bottom: 30px;}
.gallery-title { font-family: 'Grandstander'; font-size: 2.2rem; color: var(--sbatuffo-blue); margin-bottom: 25px; text-align: center; }
.grid-mini { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
.thumb-item { aspect-ratio: 1; border-radius: 15px; overflow: hidden; cursor: pointer; border: 4px solid #f8f8f8; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative;}
.thumb-item:hover { transform: scale(1.05); border-color: var(--primary); z-index: 10;}
.thumb-item img { width: 100%; height: 100%; object-fit: cover; }
.thumb-title { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: #fff; font-size: 0.8rem; padding: 5px; text-align: center; font-weight: bold;}

/* --- MODALE --- */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.active { display: flex; }
.modal-body { background: #fff; max-width: 650px; width: 100%; border-radius: 30px; padding: 30px; position: relative; text-align: center; }
.modal-img-container { width: 100%; height: 400px; background: #eee; border-radius: 20px; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.modal-img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
.m-title { font-family: 'Grandstander'; font-size: 2.2rem; color: var(--sbatuffo-blue); margin: 10px 0; }
.nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: var(--primary); color: #fff; border: 4px solid #fff; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; font-weight: 900; }
.btn-p { left: -25px; } .btn-n { right: -25px; }
.close-x { position: absolute; top: -15px; right: -15px; background: #333; color: #fff; border: 3px solid #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }

@media (max-width: 768px) {
    .header-container { flex-direction: column; text-align: center; }
    .nav-btn { position: static; transform: none; margin: 10px 20px; }
}
</style>
</head>
<body>

<header>
  <div class="header-container">
    <a href="../index.html" class="home-link-img"><img src="img/home.png" alt="Home"></a>
    <div class="brand-group">
      <h1 class="brand-title">SbatuffoBlog</h1>
      <p class="brand-subtitle">Pandaccessori</p>
    </div>
  </div>
</header>

<div class="intro-stats">
    <h2>Mappa dei PandAccessori</h2>
    <p>In totale abbiamo <span id="tot-globale">0</span> pandaccessori!</p>
</div>

<section class="map-outer">
    <div class="map-canvas">
        <div class="m-road h"></div>
        <div class="m-road v"></div>
        <div class="m-bus"></div>
        
        <div class="m-condo">
            <div class="roof"></div>
            <div class="balcony"><span class="flower">✿</span></div>
            <div class="balcony"><span class="flower">✿</span></div>
            <div class="balcony"><span class="flower">✿</span></div>
        </div>
        <a href="#sec-casa" class="m-pin" style="bottom: 350px; left: 11%;">
            <div class="pin-label">📍 Casa <span id="c-casa">0</span></div>
        </a>

        <div class="m-car-blue"></div>
        <a href="#sec-konad" class="m-pin" style="bottom: 100px; left: 18%;">
            <div class="pin-label" style="background:#0984e3;">🚗 Konad <span id="c-konad">0</span></div>
        </a>

        <div class="m-office">
            <div class="win-grid">
                <div class="win"></div><div class="win"></div>
                <div class="win"></div><div class="win"></div>
            </div>
        </div>
        <a href="#sec-progetto" class="m-pin" style="top: 100px; left: 24%;">
            <div class="pin-label" style="background:#2d3436;">🏢 Progetto <span id="c-progetto">0</span></div>
        </a>

        <div class="m-hill"></div>
        <div class="m-house-small"></div>
        <a href="#sec-cameretta" class="m-pin" style="top: 60px; right: 22%;">
            <div class="pin-label" style="background:#a29bfe;">🏠 Cameretta <span id="c-cameretta">0</span></div>
        </a>

        <div class="m-car-red"></div>
        <a href="#sec-gazy" class="m-pin" style="top: 150px; right: 14%;">
            <div class="pin-label" style="background:#d63031;">🚗 Gazy <span id="c-gazy">0</span></div>
        </a>
    </div>
</section>

<div class="section-divider">♥</div>

<div class="section-container" id="sec-casa">
    <h2 class="gallery-title">Casa Sbatuffolone</h2>
    
    <div class="plani-box" id="plani-casa">
        <div class="p-room p-salotto" onclick="openModalRoom('salotto')">
            Salotto <div class="room-badge" id="b-salotto">0</div>
        </div>
        <div class="p-room p-cucina" onclick="openModalRoom('cucina')">
            Cucina <div class="room-badge" id="b-cucina">0</div>
        </div>
        <div class="p-room p-bagno" onclick="openModalRoom('bagno')">
            Bagno <div class="room-badge" id="b-bagno">0</div>
        </div>
        <div class="p-room p-terrazzo" onclick="openModalRoom('terrazzo')">
            Terrazzo <div class="room-badge" id="b-terrazzo">0</div>
        </div>
        <div class="p-room p-corridoio" onclick="openModalRoom('corridoio')">
            Corridoio <div class="room-badge" id="b-corridoio">0</div>
        </div>
        <div class="p-room p-lettone" onclick="openModalRoom('lettone')">
            Lettone <div class="room-badge" id="b-lettone">0</div>
        </div>
    </div>

    <div id="casa-galleries-container"></div>
</div>

<div class="section-divider">♥</div>

<div class="section-container" id="sec-konad">
    <div class="gallery-card">
        <h2 class="gallery-title">Konad</h2>
        <div class="grid-mini" id="grid-konad"></div>
    </div>
</div>

<div class="section-divider">♥</div>

<div class="section-container" id="sec-progetto">
    <div class="gallery-card">
        <h2 class="gallery-title">Progetto</h2>
        <div class="grid-mini" id="grid-progetto"></div>
    </div>
</div>

<div class="section-divider">♥</div>

<div class="section-container" id="sec-cameretta">
    <div class="gallery-card">
        <h2 class="gallery-title">Cameretta</h2>
        <div class="grid-mini" id="grid-cameretta"></div>
    </div>
</div>

<div class="section-divider">♥</div>

<div class="section-container" id="sec-gazy">
    <div class="gallery-card">
        <h2 class="gallery-title">Gazy</h2>
        <div class="grid-mini" id="grid-gazy"></div>
    </div>
</div>

<div class="modal-overlay" id="lightbox">
    <div class="modal-body">
        <button class="close-x" onclick="closeModal()">×</button>
        <button class="nav-btn btn-p" onclick="nav(-1)">❮</button>
        <div class="modal-img-container">
            <img src="" id="l-img">
        </div>
        <h2 class="m-title" id="l-title">Titolo</h2>
        <button class="nav-btn btn-n" onclick="nav(1)">❯</button>
    </div>
</div>

<script>
// ==========================================
// DATABASE FOTOGRAFICO CENTRALIZZATO
// Aggiungi qui le tue foto rispettando i nomi delle cartelle!
// Non servono descrizioni e coordinate, solo Titolo e Immagine.
// ==========================================
const DB = {
    casa: {
        salotto: [
            { titolo: 'Esempio Salotto 1', immagine: 'img/casasbatuffolone/salotto/foto1.jpg' },
            { titolo: 'Esempio Salotto 2', immagine: 'img/casasbatuffolone/salotto/foto2.jpg' }
        ],
        cucina: [
            { titolo: 'Esempio Cucina 1', immagine: 'img/casasbatuffolone/cucina/foto1.jpg' }
        ],
        bagno: [],
        corridoio: [],
        terrazzo: [],
        lettone: [
            { titolo: 'Esempio Lettone 1', immagine: 'img/casasbatuffolone/lettone/foto1.jpg' }
        ]
    },
    konad: [
        { titolo: 'Esempio Konad 1', immagine: 'img/konad/foto1.jpg' }
    ],
    progetto: [
        { titolo: 'Esempio Progetto 1', immagine: 'img/progetto/foto1.jpg' }
    ],
    cameretta: [
        { titolo: 'Esempio Cameretta 1', immagine: 'img/cameretta/foto1.jpg' }
    ],
    gazy: [
        { titolo: 'Esempio Gazy 1', immagine: 'img/gazy/foto1.jpg' }
    ]
};

let activeSet = [];
let activeIdx = 0;

document.addEventListener('DOMContentLoaded', () => {
    let totaleGenerale = 0;

    // --- 1. GESTIONE CASA SBATUFFOLONE (Stanze, Contatori e Gallerie) ---
    let totaleCasa = 0;
    const casaContainer = document.getElementById('casa-galleries-container');

    for (let stanza in DB.casa) {
        let items = DB.casa[stanza];
        let conteggio = items.length;
        totaleCasa += conteggio;
        totaleGenerale += conteggio;

        // Aggiorna badge nella planimetria
        let badge = document.getElementById(`b-${stanza}`);
        if(badge) badge.innerText = conteggio;

        // Crea dinamicamente la sezione Galleria sotto la planimetria
        if (conteggio > 0) {
            let stanzaCapitalizzata = stanza.charAt(0).toUpperCase() + stanza.slice(1);
            let sectionHTML = `
                <div class="gallery-card">
                    <h3 class="brand-subtitle" style="margin-bottom:20px; font-size:1.8rem;">Raccolta PandAccessori ${stanzaCapitalizzata}</h3>
                    <div class="grid-mini" id="grid-${stanza}"></div>
                </div>
            `;
            casaContainer.insertAdjacentHTML('beforeend', sectionHTML);
            // Popola le miniature
            renderGrid(`grid-${stanza}`, items);
        }
    }
    // Aggiorna Map Pin di Casa Sbatuffolone (Totale casa)
    document.getElementById('c-casa').innerText = totaleCasa;

    // --- 2. GESTIONE ALTRI AMBIENTI ---
    const altriAmbienti = ['konad', 'progetto', 'cameretta', 'gazy'];
    altriAmbienti.forEach(ambiente => {
        let items = DB[ambiente];
        let conteggio = items.length;
        totaleGenerale += conteggio;

        // Aggiorna Map Pin
        document.getElementById(`c-${ambiente}`).innerText = conteggio;
        
        // Popola la griglia
        renderGrid(`grid-${ambiente}`, items);
    });

    // --- 3. AGGIORNA CONTATORE GLOBALE ---
    document.getElementById('tot-globale').innerText = totaleGenerale;
});

// Funzione che stampa le miniature nella griglia corretta
function renderGrid(gridId, items) {
    const grid = document.getElementById(gridId);
    if(!grid) return;
    
    items.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'thumb-item';
        div.onclick = () => openModal(items, idx);
        
        // Immagine + Titolo della foto sovraimpresso
        div.innerHTML = `
            <img src="${item.immagine}" onerror="this.src='https://via.placeholder.com/150?text=Panda'">
            <div class="thumb-title">${item.titolo}</div>
        `;
        grid.appendChild(div);
    });
}

// Funzione richiamata cliccando le stanze della planimetria
function openModalRoom(stanzaId) {
    let items = DB.casa[stanzaId];
    if (items && items.length > 0) {
        openModal(items, 0);
    } else {
        alert("Nessun Pandaccessorio ancora caricato in questa stanza!");
    }
}

// --- LOGICA MODALE (Carosello) ---
function openModal(set, idx) {
    activeSet = set;
    activeIdx = idx;
    updateModal();
    document.getElementById('lightbox').classList.add('active');
}

function closeModal() {
    document.getElementById('lightbox').classList.remove('active');
}

function nav(d) {
    activeIdx += d;
    if(activeIdx < 0) activeIdx = activeSet.length - 1;
    if(activeIdx >= activeSet.length) activeIdx = 0;
    updateModal();
}

function updateModal() {
    const it = activeSet[activeIdx];
    document.getElementById('l-img').src = it.immagine;
    document.getElementById('l-title').innerText = it.titolo;
}
</script>
</body>
</html>
