<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotopuzzle - SbatuffoBlog</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka+One&display=swap" rel="stylesheet">

<style>
  :root {
    --cartoon-yellow: #ffdf00;
    --cartoon-border-dark: #1a1a1a;
  }

  body {
    font-family: 'Fredoka One', sans-serif;
    text-align: center;
    margin: 0;
    background-color: #f8f9fa;
    color: #333;
  }

  header {
    background: #ffffff;
    padding: 20px 0;
    border-bottom: 6px solid var(--cartoon-border-dark);
  }

  header h1 {
    font-family: 'Luckiest Guy', cursive;
    color: #2332bb;
    font-size: 2.5em;
    margin: 0;
    letter-spacing: 2px;
  }

  header h1 a {
    color: #2332bb;
    text-decoration: none;
  }

  #puzzles-container {
    padding-bottom: 100px;
  }

  .puzzle-section {
    padding: 60px 15px;
    max-width: 1100px;
    margin: 0 auto;
    border-bottom: 4px dashed #ddd;
  }

  /* Titolo con lo stesso colore della cornice */
  .puzzle-title {
    font-family: 'Luckiest Guy', cursive;
    font-size: 3.5em;
    text-transform: uppercase;
    margin-bottom: 35px;
    letter-spacing: 3px;
    /* Contorno nero per leggibilità */
    -webkit-text-stroke: 1.5px var(--cartoon-border-dark);
    paint-order: stroke fill;
    filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1));
  }

  .collage-container {
    position: relative;
    display: inline-block;
    /* Il colore del bordo verrà impostato via JS */
    border: 10px solid; 
    border-radius: 30px;
    background: #fff;
    line-height: 0;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
  }

  .collage-container:hover {
    transform: scale(1.02) rotate(0.5deg);
  }

  .collage-img {
    display: block;
    max-width: 100%;
    height: auto;
    border-radius: 18px; /* Leggermente meno del contenitore per incastro perfetto */
  }

  area {
    cursor: pointer;
    outline: none;
  }

  /* Modale */
  .modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
    padding: 15px;
  }

  .modal-content {
    background-color: #fff;
    border: 7px solid var(--cartoon-border-dark);
    border-radius: 35px;
    padding: 12px;
    width: 100%;
    max-width: 750px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: comicBounce 0.4s ease-out;
  }

  @keyframes comicBounce {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .modal-img {
    width: 100%;
    height: auto;
    border: 6px solid var(--cartoon-border-dark);
    border-radius: 25px;
  }

  .modal-title {
    font-family: 'Luckiest Guy', cursive;
    margin: 20px 15px;
    font-size: 2.2em;
    color: #000;
    -webkit-text-stroke: 1px #000;
  }

  /* Pulsanti */
  .nav-btn, .close-btn {
    position: absolute;
    background: var(--cartoon-yellow);
    border: 5px solid var(--cartoon-border-dark);
    color: #000;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 5px 5px 0px rgba(0,0,0,0.2);
    z-index: 2100;
  }

  .close-btn {
    top: -25px;
    right: -10px;
    background: #ff4747;
    color: white;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    font-size: 32px;
  }

  .nav-btn {
    top: 50%;
    transform: translateY(-50%);
    width: 70px;
    height: 70px;
    border-radius: 50%;
    font-size: 40px;
    font-family: 'Luckiest Guy', cursive;
  }

  .prev-btn { left: -40px; }
  .next-btn { right: -40px; }

  .hidden { visibility: hidden; pointer-events: none; }

  @media (max-width: 850px) {
    .nav-btn { width: 55px; height: 55px; font-size: 25px; }
    .prev-btn { left: 10px; }
    .next-btn { right: 10px; }
    .puzzle-title { font-size: 2.2em; }
    .collage-container { border-width: 6px; }
  }
</style>
</head>

<body>

<header>
  <h1>
      <a class="home-link" href="../index.html">SbatuffoBlog</a>
      <span> - Fotopuzzle</span>
  </h1>
</header>

<div id="puzzles-container"></div>

<div id="photo-modal" class="modal" onclick="if(event.target == this) closeModal()">
  <div class="modal-content">
    <div class="close-btn" onclick="closeModal()">&times;</div>
    <div id="prev-btn" class="nav-btn prev-btn" onclick="navigate(-1)">&#10094;</div>
    <div id="next-btn" class="nav-btn next-btn" onclick="navigate(1)">&#10095;</div>

    <img src="" id="modal-img" class="modal-img">
    <div id="modal-title" class="modal-title"></div>
  </div>
</div>

<script>
  const puzzlesContainer = document.getElementById('puzzles-container');
  const modal = document.getElementById('photo-modal');
  const modalImg = document.getElementById('modal-img');
  const modalTitle = document.getElementById('modal-title');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');

  // Mappa colori basata sulle cornici reali delle immagini
  const puzzleColors = {
    1: '#2332bb', // Blu (Fotopuzzle 1)
    2: '#28a745', // Verde (Fotopuzzle 2)
    3: '#ff9800', // Arancione (Fotopuzzle 3)
    4: '#e91e63', // Magenta (Fotopuzzle 4)
    5: '#673ab7', // Viola (Fotopuzzle 5)
    6: '#00bcd4', // Ciano/Azzurro (Inventato per Fotopuzzle 6)
    7: '#ff4747'  // Rosso (Fotopuzzle 7)
  };

  const puzzleIds = [1, 2, 3, 4, 5, 6, 7];
  let allPuzzlesData = {}; 
  let currentPuzzleId = null;
  let currentIndex = -1;

  function createPuzzleSections() {
    puzzleIds.forEach((id) => {
      const color = puzzleColors[id];
      
      const section = document.createElement('section');
      section.className = 'puzzle-section';
      section.innerHTML = `
        <h2 class="puzzle-title" style="color: ${color}">Fotopuzzle ${id}</h2>
        <div class="collage-container" style="border-color: ${color}; box-shadow: 18px 18px 0px ${color}">
          <img src="imm/fotopuzzle${id}.jpg" usemap="#map-puzzle-${id}" class="collage-img" id="img-puzzle-${id}">
          <map name="map-puzzle-${id}" id="map-puzzle-${id}"></map>
        </div>
      `;
      puzzlesContainer.appendChild(section);
      
      allPuzzlesData[id] = { photos: [], originalCoords: [] };
      loadMapData(id);
    });
  }

  async function loadMapData(id) {
    try {
      const response = await fetch(`fotopuzzle${id}_areamap.json`);
      const htmlText = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, 'text/html');
      const areas = doc.querySelectorAll('area');
      const mapElement = document.getElementById(`map-puzzle-${id}`);
      const imgElement = document.getElementById(`img-puzzle-${id}`);

      areas.forEach((area, index) => {
        const photoNumber = area.getAttribute('href').replace('#', '');
        const photoTitle = area.getAttribute('title');
        
        allPuzzlesData[id].photos.push({ number: photoNumber, title: photoTitle });
        allPuzzlesData[id].originalCoords.push(area.coords);

        const newArea = document.createElement('area');
        newArea.shape = area.shape;
        newArea.coords = area.coords;
        newArea.onclick = (e) => {
          e.preventDefault();
          openModal(id, index);
        };
        mapElement.appendChild(newArea);
      });

      imgElement.onload = () => makeResponsive(id);
      if (imgElement.complete) makeResponsive(id);

    } catch (e) { console.error(e); }
  }

  function openModal(puzzleId, index) {
    currentPuzzleId = puzzleId;
    currentIndex = index;
    updateModalContent();
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function updateModalContent() {
    const data = allPuzzlesData[currentPuzzleId];
    const photo = data.photos[currentIndex];
    const color = puzzleColors[currentPuzzleId];

    // Applica il colore del puzzle anche all'ombra del modale
    document.querySelector('.modal-content').style.boxShadow = `20px 20px 0px ${color}`;

    modalImg.src = `imm/fotopuzzle${currentPuzzleId}/${photo.number}_${photo.title}.jpg`;
    modalTitle.innerText = photo.title;

    prevBtn.classList.toggle('hidden', currentIndex === 0);
    nextBtn.classList.toggle('hidden', currentIndex === data.photos.length - 1);
  }

  function navigate(direction) {
    const data = allPuzzlesData[currentPuzzleId];
    const newIndex = currentIndex + direction;
    if (newIndex >= 0 && newIndex < data.photos.length) {
      currentIndex = newIndex;
      updateModalContent();
    }
  }

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  function makeResponsive(id) {
    const img = document.getElementById(`img-puzzle-${id}`);
    const map = document.getElementById(`map-puzzle-${id}`);
    const areas = map.getElementsByTagName('area');
    const data = allPuzzlesData[id];

    function resize() {
      const ratio = img.clientWidth / img.naturalWidth;
      if (!ratio) return;
      for (let i = 0; i < areas.length; i++) {
        const coords = data.originalCoords[i].split(',').map(c => Math.round(parseInt(c) * ratio));
        areas[i].coords = coords.join(',');
      }
    }
    window.addEventListener('resize', resize);
    resize();
  }

  createPuzzleSections();
</script>

</body>
</html>
