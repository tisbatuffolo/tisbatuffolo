<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotopuzzle - SbatuffoBlog</title>

<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Grandstander:wght@900&family=Luckiest+Guy&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --cartoon-yellow: #ffdf00;
    --cartoon-border-dark: #1a1a1a;
    --main-blue: #0000ff;
    --light-blue-border: #bde0fe;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Fredoka', sans-serif;
    text-align: center;
    margin: 0;
    background-color: #f8f9fa;
    color: #333;
    overflow-x: hidden;
  }

  /* Header aggiornato: sfondo bianco e layout con icona */
  header {
    background: #fff; /* Sfondo bianco richiesto */
    padding: 20px 20px;
    border-bottom: 2px solid var(--main-blue);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 80px;
  }

  .home-icon {
    position: absolute;
    left: 20px;
    display: flex;
    align-items: center;
    transition: transform 0.2s ease;
  }

  .home-icon:hover {
    transform: scale(1.1);
  }

  .home-icon svg {
    width: 40px;
    height: 40px;
    fill: var(--main-blue); /* Colore coerente con il brand */
  }

  header h1 {
    font-family: 'Grandstander', cursive;
    color: var(--main-blue);
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    margin: 0;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
  }

  header h1 a {
    color: var(--main-blue);
    text-decoration: none;
  }

  #puzzles-container { padding-bottom: 100px; }

  .puzzle-section {
    padding: 60px 15px;
    max-width: 1100px;
    margin: 0 auto;
    border-bottom: 4px dashed #ddd;
  }

  .puzzle-title {
    font-family: 'Boogaloo', cursive;
    font-size: 4.5em;
    margin-bottom: 35px;
    letter-spacing: 2px;
    -webkit-text-stroke: 1px var(--cartoon-border-dark);
    paint-order: stroke fill;
    filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1));
  }

  .puzzle-subtitle {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.3em;
    color: #000000;
    margin-top: -25px;
    margin-bottom: 30px;
    font-weight: 600;
  }

  .collage-container {
    position: relative;
    display: inline-block;
    border: 10px solid; 
    border-radius: 30px;
    background: #fff;
    line-height: 0;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    max-width: 95%;
  }

  .collage-container:hover { transform: scale(1.02) rotate(0.5deg); }

  .collage-img {
    display: block;
    max-width: 100%;
    height: auto;
    border-radius: 18px;
  }

  .modal {
    display: none;
    position: fixed;
    z-index: 2000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);
    justify-content: center;
    align-items: center;
    padding: 15px;
  }

  .modal-content {
    background-color: #fff;
    border: 7px solid var(--cartoon-border-dark);
    border-radius: 35px;
    padding: 12px;
    width: 100%;
    max-width: 750px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: comicBounce 0.4s ease-out;
  }

  @keyframes comicBounce {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .modal-img {
    max-width: 100%;
    max-height: 65vh;
    width: auto;
    height: auto;
    object-fit: contain;
    border: 6px solid var(--cartoon-border-dark);
    border-radius: 25px;
  }

  .modal-title {
    font-family: 'Luckiest Guy', cursive;
    margin: 20px 15px 10px;
    font-size: 2.2em;
    color: #000;
    letter-spacing: 1px;
    line-height: 1.1;
    -webkit-text-stroke: 1px #000;
  }

  .modal-caption {
    display: block;
    font-size: 0.6em;
    font-family: 'Fredoka', sans-serif;
    color: #555;
    margin-top: 8px;
    font-weight: 400;
    letter-spacing: 0;
    -webkit-text-stroke: 0; 
  }

  .nav-btn, .close-btn {
    position: absolute;
    background: var(--cartoon-yellow);
    border: 5px solid var(--cartoon-border-dark);
    color: #000;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 5px 5px 0px rgba(0,0,0,0.2);
    z-index: 2100;
  }

  .close-btn {
    top: -25px; right: -10px;
    background: #ff4747; color: white;
    width: 55px; height: 55px;
    border-radius: 50%; font-size: 32px;
  }

  .nav-btn {
    top: 50%; transform: translateY(-50%);
    width: 70px; height: 70px;
    border-radius: 50%; font-size: 40px;
    font-family: 'Luckiest Guy', cursive;
  }

  .prev-btn { left: -40px; }
  .next-btn { right: -40px; }

  .hidden { visibility: hidden; pointer-events: none; }

  @media (max-width: 850px) {
    .nav-btn { width: 45px; height: 45px; font-size: 22px; }
    .prev-btn { left: -5px; }
    .next-btn { right: -5px; }
    .puzzle-title { font-size: 2.8em; margin-bottom: 25px; }
    .puzzle-subtitle { font-size: 1.1em; margin-top: -15px; }
    .collage-container { border-width: 6px; }
    .modal-content { border-width: 5px; width: 94%; }
    .modal-title { font-size: 1.4em; margin: 10px 5px 5px; }
    .home-icon { left: 10px; }
    .home-icon svg { width: 30px; height: 30px; }
  }
</style>
</head>

<body>

<header>
  <a href="../index.html" class="home-icon" title="Torna alla Home">
    <svg viewBox="0 0 24 24">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
  </a>
  <h1>
      <a class="home-link" href="../index.html">SbatuffoBlog</a>
      <span> - Fotopuzzle</span>
  </h1>
</header>

<div id="puzzles-container"></div>

<div id="photo-modal" class="modal" onclick="if(event.target == this) closeModal()">
  <div class="modal-content" id="modal-content-box">
    <div class="close-btn" onclick="closeModal()">&times;</div>
    <div id="prev-btn" class="nav-btn prev-btn" onclick="navigate(-1)">&#10094;</div>
    <div id="next-btn" class="nav-btn next-btn" onclick="navigate(1)">&#10095;</div>

    <img src="" id="modal-img" class="modal-img">
    <div id="modal-title" class="modal-title"></div>
  </div>
</div>

<script>
  const puzzlesContainer = document.getElementById('puzzles-container');
  const modal = document.getElementById('photo-modal');
  const modalBox = document.getElementById('modal-content-box');
  const modalImg = document.getElementById('modal-img');
  const modalTitle = document.getElementById('modal-title');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');

  const puzzleColors = {
    1: '#2332bb', 2: '#28a745', 3: '#ff9800', 
    4: '#e91e63', 5: '#673ab7', 6: '#00bcd4', 7: '#ff4747'
  };

  const puzzleSubtitles = {
    1: "Scorri i nostri primi giri fatti nel 2018 e 2019!",
    2: "Esplora tutte le foto nel fotopuzzle 2020!",
    3: "Ricordati i nomi dei giri nel fotopuzzle 2021!",
    4: "Tutti i giretti del 2022!",
    5: "Guarda le foto nel nostro anniversario lustro!",
    6: "Dove eravamo qui??? Ti ricordiiiii???",
    7: "L'ultimo fotopuzzle....per ora!"
  };

  const puzzleIds = [1, 2, 3, 4, 5, 6, 7];
  let allPuzzlesData = {}; 
  let currentPuzzleId = null;
  let currentIndex = -1;

  function createPuzzleSections() {
    puzzleIds.forEach((id) => {
      const color = puzzleColors[id];
      const subtitle = puzzleSubtitles[id];
      const section = document.createElement('section');
      section.className = 'puzzle-section';
      section.innerHTML = `
        <h2 class="puzzle-title" style="color: ${color}">Fotopuzzle ${id}</h2>
        <p class="puzzle-subtitle">${subtitle}</p>
        <div class="collage-container" style="border-color: ${color}; box-shadow: 18px 18px 0px ${color}">
          <img src="imm/fotopuzzle${id}.jpg" usemap="#map-puzzle-${id}" class="collage-img" id="img-puzzle-${id}">
          <map name="map-puzzle-${id}" id="map-puzzle-${id}"></map>
        </div>
      `;
      puzzlesContainer.appendChild(section);
      allPuzzlesData[id] = { photos: [], originalCoords: [] };
      loadMapData(id);
    });
  }

  async function loadMapData(id) {
    try {
      const response = await fetch(`fotopuzzle${id}_areamap.json`);
      const htmlText = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlText, 'text/html');
      const areas = doc.querySelectorAll('area');
      const mapElement = document.getElementById(`map-puzzle-${id}`);
      const imgElement = document.getElementById(`img-puzzle-${id}`);

      areas.forEach((area, index) => {
        allPuzzlesData[id].photos.push({ 
            number: area.getAttribute('href').replace('#', ''), 
            title: area.getAttribute('title') 
        });
        allPuzzlesData[id].originalCoords.push(area.coords);

        const newArea = document.createElement('area');
        newArea.shape = area.shape;
        newArea.coords = area.coords;
        newArea.onclick = (e) => { e.preventDefault(); openModal(id, index); };
        mapElement.appendChild(newArea);
      });

      imgElement.onload = () => makeResponsive(id);
      if (imgElement.complete) makeResponsive(id);
    } catch (e) { console.error(e); }
  }

  function openModal(puzzleId, index) {
    currentPuzzleId = puzzleId;
    currentIndex = index;
    updateModalContent();
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function updateModalContent() {
    const data = allPuzzlesData[currentPuzzleId];
    const photo = data.photos[currentIndex];
    const color = puzzleColors[currentPuzzleId];

    modalBox.style.boxShadow = `20px 20px 0px ${color}`;
    modalImg.src = `imm/fotopuzzle${currentPuzzleId}/${photo.number}_${photo.title}.jpg`;
    
    let rawTitle = photo.title;
    if (rawTitle.includes('(')) {
        const parts = rawTitle.split('(');
        modalTitle.innerHTML = `${parts[0].trim()}<span class="modal-caption">(${parts[1].replace(')', '').trim()})</span>`;
    } else {
        modalTitle.innerText = rawTitle;
    }

    prevBtn.classList.toggle('hidden', currentIndex === 0);
    nextBtn.classList.toggle('hidden', currentIndex === data.photos.length - 1);
  }

  function navigate(direction) {
    const data = allPuzzlesData[currentPuzzleId];
    const newIndex = currentIndex + direction;
    if (newIndex >= 0 && newIndex < data.photos.length) {
      currentIndex = newIndex;
      updateModalContent();
    }
  }

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  function makeResponsive(id) {
    const img = document.getElementById(`img-puzzle-${id}`);
    const map = document.getElementById(`map-puzzle-${id}`);
    const areas = map.getElementsByTagName('area');
    const data = allPuzzlesData[id];

    function resize() {
      const ratio = img.clientWidth / img.naturalWidth;
      if (!ratio) return;
      for (let i = 0; i < areas.length; i++) {
        const coords = data.originalCoords[i].split(',').map(c => Math.round(parseInt(c) * ratio));
        areas[i].coords = coords.join(',');
      }
    }
    window.addEventListener('resize', resize);
    resize();
  }

  createPuzzleSections();
</script>

</body>
</html>
