<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SbatuffoBlog - PandaMusic</title>

<link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #ffcbfe; 
  --sbatuffo-blue: #0000ff; 
  --accent: #ff4757;
  --bg-soft: #fdfdfd;
  --text: #1a1a1a;
  --stroke: #1a1a1a;
  --heart-red: #ff4d4d;
}

body { 
    font-family: 'Fredoka', sans-serif; 
    margin: 0; 
    background: var(--bg-soft); 
    color: var(--text); 
    overflow-x: hidden; 
}

/* --- HEADER --- */
header { background: #fff; padding: 25px 10px 5px; text-align: center; }
.header-container { display: flex; justify-content: center; align-items: center; gap: 30px; position: relative; }
.home-link-img { position: absolute; left: 20px; top: 5px; }
.home-link-img img { width: clamp(70px, 12vw, 100px); height: auto; }
.brand-title { font-family: 'Grandstander', cursive; font-weight: 900; font-size: clamp(2.2rem, 8vw, 4.2rem); color: var(--sbatuffo-blue); text-decoration: none; }
.brand-subtitle { font-size: clamp(0.9rem, 3vw, 1.2rem); color: var(--primary); font-weight: 700; margin-top: 5px; text-transform: lowercase; }

/* --- DIVISORE --- */
.section-divider { max-width: 200px; height: 3px; background: var(--primary); margin: 30px auto; border-radius: 50px; position: relative; }
.section-divider::after { content: "♥"; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--bg-soft); padding: 0 15px; color: var(--heart-red); font-size: 1.5rem; }

.container { width: 100%; max-width: 700px; margin: 0 auto; padding: 15px; box-sizing: border-box; min-height: 50vh; }
.section-title { font-family: 'Grandstander', cursive; font-size: 1.9rem; font-weight: 900; margin: 20px 0 30px 0; border-left: 6px solid var(--primary); padding-left: 12px; }

/* --- PLAYLIST CARD ORIGINALE --- */
.playlist-card {
    background: #fff;
    border: 3.5px solid var(--stroke);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 8px 8px 0 var(--primary);
    position: relative;
    overflow: hidden;
}

.card-content { display: flex; gap: 20px; align-items: center; }

.cover-art {
    width: 120px; height: 120px;
    background: linear-gradient(135deg, var(--sbatuffo-blue), var(--primary));
    border: 3px solid var(--stroke);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    position: relative;
}

.cover-text { font-family: 'Grandstander', cursive; font-weight: 900; font-size: 3rem; color: #fff; text-shadow: 3px 3px 0 var(--stroke); }

/* --- DETTAGLIO ROTELLE CASSETTA (Sotto la card) --- */
.cassette-mechanism {
    background: #e0e0e0;
    border: 3px solid var(--stroke);
    border-radius: 15px;
    margin-top: 15px;
    padding: 12px;
    display: flex;
    justify-content: center;
    gap: 60px;
    box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
}

.reel {
    width: 50px; height: 50px;
    background: #222;
    border-radius: 50%;
    border: 4px solid #555;
    position: relative;
}

/* Dentini interni delle rotelle */
.reel::after {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    background: repeating-conic-gradient(from 0deg, transparent 0deg 30deg, #444 31deg 60deg);
    border-radius: 50%;
}

.spinning { animation: spinReel 2.5s linear infinite; }
@keyframes spinReel { 100% { transform: rotate(360deg); } }

/* --- BOTTONI --- */
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
.btn {
    font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 0.9rem; padding: 10px 18px;
    border: 2.5px solid var(--stroke); border-radius: 12px;
    cursor: pointer; text-decoration: none; transition: 0.15s;
    box-shadow: 3px 3px 0 var(--stroke);
}
.btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0 var(--stroke); }
.btn-link { background: #fff; color: var(--text); }
.btn-play { background: var(--primary); color: var(--stroke); }

/* --- PLAYER --- */
.player-container {
    margin-top: 20px;
    display: none;
    animation: slideDown 0.4s ease-out forwards;
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

footer { background: #fff; padding: 20px 10px 40px; text-align: center; }
.footer-text { font-family: 'Grandstander', cursive; font-weight: 600; font-size: 1.2rem; color: #444; }
</style>
</head>

<body>
<header>
  <div class="header-container">
    <a href="../index.html" class="home-link-img"><img src="img/home.png" alt="Home"></a>
    <div class="brand-wrapper">
      <a href="../index.html" class="brand-title">SbatuffoBlog</a>
      <div class="brand-subtitle">PandaMusic</div>
    </div>
  </div>
</header>

<div class="section-divider"></div>

<main class="container">
  <div class="section-title">Le mie playlist 🎵</div>
  
  <div class="playlist-card">
      <div class="card-content">
          <div class="cover-art"><span class="cover-text">883</span></div>
          <div class="playlist-info">
              <h3 style="font-family: 'Grandstander'; font-size: 1.8rem; margin:0;">Max & 883 Hits</h3>
              <p style="color:#666; margin: 10px 0;">I mitici anni '90 direttamente nel blog!</p>
              
              <div class="btn-group">
                  <a href="https://open.spotify.com/playlist/37i9dQZF1DZ06evy09IStG" target="_blank" class="btn btn-link">Apri su Spotify ↗️</a>
                  <button class="btn btn-play" onclick="toggleMusic()">Ascolta preview qui 🎧</button>
              </div>
          </div>
      </div>

      <div class="cassette-mechanism">
          <div class="reel" id="reel-1"></div>
          <div class="reel" id="reel-2"></div>
      </div>

      <div class="player-container" id="player-box">
          <iframe 
              style="border-radius:12px; border: 2.5px solid #000;" 
              src="https://open.spotify.com/embed/playlist/37i9dQZF1DZ06evy09IStG?utm_source=generator&theme=0" 
              width="100%" 
              height="152" 
              frameBorder="0" 
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
              loading="lazy">
          </iframe>
      </div>
  </div>
</main>

<div class="section-divider"></div>

<footer>
    <div class="footer-text">@SbatuffoBlog 2026</div>
</footer>

<script>
function toggleMusic() {
    const player = document.getElementById('player-box');
    const r1 = document.getElementById('reel-1');
    const r2 = document.getElementById('reel-2');
    
    if (player.style.display === "none" || player.style.display === "") {
        player.style.display = "block";
        r1.classList.add("spinning");
        r2.classList.add("spinning");
    } else {
        player.style.display = "none";
        r1.classList.remove("spinning");
        r2.classList.remove("spinning");
    }
}
</script>

</body>
</html>
