name: Aggiorna Pandagenda

on:
  repository_dispatch:
    types: [update_agenda]

jobs:
  update:
    runs-on: ubuntu-latest

    # ✅ QUESTA RIGA RISOLVE L'ERRORE NODE.js
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scrive agenda.json
        run: |
          echo '${{ toJSON(github.event.client_payload.events) }}' > pandagenda/agenda.json

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pandagenda/agenda.json
          git commit -m "Aggiornamento Pandagenda automatico" || echo "Nessuna modifica da committare"
          git push