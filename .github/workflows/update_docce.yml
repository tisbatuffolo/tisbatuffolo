name: Aggiorna Doccelunghe

on:
  repository_dispatch:
    types: [update_docce]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Esegue incremento docce
        run: |
          # Esegue lo script python che legge docce.json e incrementa il mese corrente
          python doccelunghe/aggiorna-docce.py

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add doccelunghe/docce.json
          git commit -m "🚿 Incremento doccia automatico" || echo "Nessuna modifica da committare"
          git push