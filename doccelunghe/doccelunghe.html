<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SbatuffoBlog - Doccelunghe</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
     /* --theme-color: #1b2566; */
      --theme-color: #ff802b;
      --sbatuffo-blue: #0000ff;
      --card-blue: #2366c6; 
      --heart-red: #ff4d4d;
      --bg-soft: #fdfdfd;
      --text-dark: #1a1a1a;
      --stroke: #1a1a1a;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background: var(--bg-soft);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: var(--text-dark);
    }

    /* --- HEADER --- */
    header { background: #fff; padding: 25px 10px 5px; text-align: center; }
    .header-container { display: flex; justify-content: center; align-items: center; gap: 30px; position: relative; }
    .home-link-img { position: absolute; left: 20px; top: 5px; }
    .home-link-img img { width: clamp(45px, 10vw, 80px); height: auto; }
    .brand-title { font-family: 'Grandstander', cursive; font-weight: 900; font-size: clamp(1.8rem, 7vw, 3.5rem); color: var(--sbatuffo-blue); text-decoration: none; line-height: 1; }
    .brand-subtitle { font-weight: 700; font-size: clamp(0.75rem, 2.5vw, 1.1rem); color: var(--theme-color); text-transform: lowercase; }

    /* --- DIVISORI --- */
    .section-divider {
      max-width: 200px;
      height: 3px;
      background: var(--theme-color);
      margin: 15px auto;
      border-radius: 50px;
      position: relative;
    }
    .section-divider::after {
      content: "♥";
      position: absolute;
      top: -14px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg-soft);
      padding: 0 15px;
      color: var(--heart-red);
      font-size: 1.5rem;
    }

    main { flex: 1; padding: 0 5px; max-width: 1000px; margin: 0 auto; width: 100%; box-sizing: border-box; }

    /* --- TITOLO PRINCIPALE (Distanziato dal separatore) --- */
    .main-title {
        text-align: center;
        font-family: 'Grandstander', cursive;
        font-weight: 900;
        font-size: clamp(1.4rem, 5vw, 2.2rem);
        color: var(--theme-color);
        margin: 35px 0 15px;
    }

    /* --- BOX CONTATORI --- */
    .stats-box {
      background: #fff;
      padding: 8px;
      border-radius: 20px;
      border: 3px solid var(--card-blue);
      text-align: center;
      margin: 0 auto 25px;
      width: 90%;
      max-width: 320px; 
    }
    .stats-box p { margin: 4px 0; color: var(--card-blue); font-size: clamp(0.85rem, 2.5vw, 1.05rem); font-weight: 700; }
    .stats-box span { font-family: 'Grandstander', cursive; font-weight: 900; color: var(--heart-red); font-size: 1.2rem; }

    /* --- LAYOUT BILANCIATO (Sempre affiancato) --- */
    .main-layout {
      display: flex;
      flex-direction: row !important;
      justify-content: center;
      align-items: stretch;
      gap: clamp(5px, 2vw, 15px);
      width: 100%;
    }

    /* COLONNA SINISTRA (GRID FORZATA 3x4) */
    .months-grid {
      display: grid !important;
      grid-template-columns: repeat(3, 1fr) !important;
      gap: clamp(3px, 1vw, 8px);
      flex: 1;
    }
    .month-card {
      background: #fff;
      border: 2px solid var(--card-blue);
      border-radius: clamp(6px, 1.5vw, 12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: clamp(55px, 14vw, 80px);
      padding: 2px;
    }
    .month-name { font-weight: 700; font-size: clamp(0.55rem, 1.6vw, 0.75rem); color: var(--theme-color); text-transform: uppercase; margin-bottom: 2px; }
    .month-count { font-family: 'Grandstander', cursive; font-weight: 900; font-size: clamp(1rem, 3.5vw, 1.6rem); color: var(--card-blue); line-height: 1; }

    /* COLONNA DESTRA (GRAFICO + IMG) */
    .visual-col {
      flex: 1.3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .canvas-container {
        width: 100%;
        background: #fff;
        border: 3px solid var(--card-blue);
        border-radius: 20px;
        overflow: hidden;
    }
    canvas#docce-trend { width: 100% !important; height: auto !important; display: block; }
    
    #trend-image { 
        display: block !important;
        width: 100%; 
        max-width: 280px; 
        height: auto; 
        object-fit: contain; 
        margin-top: 5px;
    }

    /* BOTTONE AGGIUNGI (CENTRALE) */
    .btn-container { width: 100%; text-align: center; margin: 30px 0 40px; }
    #btn-aggiungi {
      width: 90%;
      max-width: 320px;
      padding: clamp(10px, 3vw, 15px);
      background: var(--heart-red);
      color: #fff;
      border: 3px solid var(--stroke);
      border-radius: 50px;
      font-family: 'Grandstander', cursive;
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--stroke);
    }
    #btn-aggiungi:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--stroke); }

    /* FOOTER */
    footer { padding: 20px; text-align: center; font-family: 'Grandstander'; color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <a href="../index.html" class="home-link-img"><img src="img/home.png" alt="Home"></a>
      <div>
        <div class="brand-title">SbatuffoBlog</div>
        <div class="brand-subtitle">doccelunghe</div>
      </div>
    </div>
  </header>

  <center><div class="section-divider"></div></center>

  <main>
    <h2 class="main-title">Docce Insieme</h2>

    <div class="stats-box">
      <p>Docce da inizio anno: <span id="tot-anno">0</span></p>
      <p>Docce in questo mese: <span id="tot-mese">0</span></p>
    </div>

    <div class="main-layout">
      <div class="months-grid" id="grid"></div>

      <div class="visual-col">
        <div class="canvas-container">
            <canvas id="docce-trend" width="400" height="280"></canvas>
        </div>
        <img id="trend-image" src="" alt="Trend doccia">
      </div>
    </div>

    <div class="btn-container">
      <button id="btn-aggiungi">Aggiungi Doccia 🚿</button>
    </div>
  </main>

  <center><div class="section-divider"></div></center>

  <footer>@SbatuffoBlog 2026</footer>

  <script>
    const mesi = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
    const d = new Date();
    const curY = d.getFullYear(), curM = d.getMonth() + 1;
    let dataDocce = {};

    function render() {
      const annoData = dataDocce[curY] || {};
      let total = 0;
      for(let i=1; i<=12; i++) total += (annoData[i] || 0);

      document.getElementById('tot-anno').textContent = total;
      document.getElementById('tot-mese').textContent = annoData[curM] || 0;

      const grid = document.getElementById('grid');
      grid.innerHTML = "";
      mesi.forEach((n, i) => {
        const m = i + 1;
        const count = annoData[m] || 0;
        const card = document.createElement('div');
        card.className = 'month-card';
        
        if(m === curM) {
            card.style.borderColor = "var(--heart-red)";
            card.innerHTML = `<div class="month-name" style="color:var(--heart-red)">${n}</div>
                              <div class="month-count" style="color:var(--heart-red)">${count}</div>`;
        } else {
            card.innerHTML = `<div class="month-name" style="color:var(--theme-color)">${n}</div>
                              <div class="month-count" style="color:var(--card-blue)">${count}</div>`;
        }
        grid.appendChild(card);
      });

      // --- CANVAS TREND ---
      const c = document.getElementById('docce-trend'), ctx = c.getContext('2d');
      const p = 30, w = c.width - p*2, h = c.height - p*3;
      const vals = mesi.map((_, i) => annoData[i+1] || 0);
      const max = Math.max(...vals, 5);

      ctx.clearRect(0,0,c.width,c.height);

      // Titolo grafico con colore tema (1b2566)
      ctx.fillStyle = "#1b2566";
      ctx.font = "bold 18px Grandstander";
      ctx.textAlign = "center";
      ctx.fillText("Trend docce mese per mese", c.width/2, 28);

      // Linea Trend
      ctx.beginPath(); 
      ctx.strokeStyle = "#2366c6"; 
      ctx.lineWidth = 4;
      ctx.lineJoin = "round";
      vals.forEach((v, i) => {
        const x = p + (i/11)*w, y = p + h - (v/max)*h + 35;
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      });
      ctx.stroke();

      // Punti
      vals.forEach((v, i) => {
        const x = p + (i/11)*w, y = p + h - (v/max)*h + 35;
        ctx.beginPath();
        ctx.arc(x,y, (i+1===curM?7:4), 0, Math.PI*2);
        ctx.fillStyle = (i+1===curM ? "red" : "#2366c6"); 
        ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
        
        ctx.fillStyle = "#1b2566"; 
        ctx.font = "bold 11px Fredoka";
        ctx.textAlign = "center";
        ctx.fillText(mesi[i].substring(0,3), x, h + p + 52);
      });

      const trendImg = document.getElementById('trend-image');
      const docceMesePrec = annoData[curM - 1] || 0;
      trendImg.src = (annoData[curM] >= docceMesePrec) ? "img/docciafelice.png" : "img/docciatriste.png";
    }

    fetch('docce.json').then(r => r.json()).then(d => { dataDocce = d; render(); });

    document.getElementById('btn-aggiungi').onclick = async () => {
      const btn = document.getElementById('btn-aggiungi');
      btn.disabled = true;
      if(!dataDocce[curY]) dataDocce[curY] = {};
      dataDocce[curY][curM] = (dataDocce[curY][curM] || 0) + 1;
      render();

      try {
        await fetch('https://tisbatuffoblog.vercel.app/api/update_docceAPI', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'}
        });
      } catch (e) { console.error("Errore API:", e); }
      finally { btn.disabled = false; }
    };
  </script>
</body>
</html>
