<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SbatuffoBlog - Doccelunghe</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --theme-color: #ff802b; 
      --sbatuffo-blue: #0000ff;
      --text-dark: #1a1a1a;
      --card-blue: #2366c6;
      --heart-red: #ff4d4d;
      --bg-soft: #fdfdfd;
      --stroke: #1a1a1a;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background: var(--bg-soft);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: var(--text-dark);
    }

    /* --- HEADER --- */
    header { background: #fff; padding: 25px 10px 5px; text-align: center; }
    .header-container { display: flex; justify-content: center; align-items: center; gap: 30px; position: relative; }
    .home-link-img { position: absolute; left: 20px; top: 5px; }
    .home-link-img img { width: 80px; height: auto; }
    .brand-title { font-family: 'Grandstander', cursive; font-weight: 900; font-size: 3.5rem; color: var(--sbatuffo-blue); text-decoration: none; }
    .brand-subtitle { font-weight: 700; font-size: 1.1rem; color: var(--theme-color); text-transform: lowercase; }

    /* --- DIVISORI (CORTI COME PANDAGENDA) --- */
    .divider-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 150px; /* Lunghezza ridotta */
      margin: 25px auto;
    }
    .linea-arancio {
      flex: 1;
      height: 0;
      border-bottom: 3px solid var(--theme-color);
    }
    .cuore-div {
      padding: 0 10px;
      color: var(--heart-red);
      font-size: 1.4rem;
    }

    /* --- BOX CONTATORI (STILE AGGIUNGI DOCCIA) --- */
    .stats-box {
      max-width: 550px;
      margin: 10px auto 35px;
      background: #ffffff; /* Sfondo bianco richiesto */
      padding: 15px;
      border-radius: 25px;
      border: 3px solid var(--card-blue); /* Contorno azzurro */
      text-align: center;
      font-family: 'Grandstander', cursive; /* Stesso font bottone */
      font-weight: 900; /* Grassetto */
    }
    .stats-box p { 
      margin: 5px 0; 
      color: var(--text-dark);
      font-size: 1.3rem;
    }
    .stats-box span { 
      color: var(--theme-color); 
      font-size: 1.7rem;
    }

    main { flex: 1; padding: 0 15px; }

    /* --- LAYOUT BILANCIATO --- */
    .main-layout {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* COLONNA SINISTRA (CARD) */
    .months-grid {
      display: grid;
      grid-template-columns: repeat(3, 125px); /* Dimensione fissa per coerenza */
      gap: 10px;
    }
    .month-card {
      background: #fff;
      border: 3px solid var(--card-blue);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100px; /* Altezza calibrata */
      transition: transform 0.2s;
    }
    .month-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 2px; }
    .month-count { font-family: 'Grandstander', cursive; font-weight: 900; font-size: 2.1rem; color: var(--theme-color); }

    /* COLONNA DESTRA (GRAFICO + IMG) */
    .visual-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 400px;
    }
    canvas#docce-trend {
      background: #fff;
      border: 3px solid var(--card-blue);
      border-radius: 20px;
      width: 100%;
      height: 250px; /* Pareggia le 4 file di card (100*4 + gap) */
    }
    #trend-image { width: 190px; margin-top: 15px; height: auto; }

    /* BOTTONE CENTRALE */
    .btn-wrap { text-align: center; margin: 40px 0; }
    #btn-aggiungi {
      padding: 15px 45px;
      background: var(--heart-red);
      color: #fff;
      border: 3px solid var(--stroke);
      border-radius: 50px;
      font-family: 'Grandstander', cursive;
      font-size: 1.5rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 5px 5px 0 var(--stroke);
    }
    #btn-aggiungi:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--stroke); }

    footer { padding: 30px; text-align: center; font-family: 'Grandstander'; color: #666; }

    /* Mobile: Manteniamo il layout affiancato rimpicciolendo */
    @media (max-width: 800px) {
      .main-layout { gap: 10px; }
      .months-grid { grid-template-columns: repeat(3, 1fr); width: 55%; }
      .visual-col { width: 45%; }
      .month-card { height: 85px; }
      canvas#docce-trend { height: 210px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <a href="../index.html" class="home-link-img"><img src="img/home.png"></a>
      <div>
        <div class="brand-title">SbatuffoBlog</div>
        <div class="brand-subtitle">doccelunghe</div>
      </div>
    </div>
  </header>

  <div class="divider-wrapper">
    <div class="linea-arancio"></div>
    <div class="cuore-div">♥</div>
    <div class="linea-arancio"></div>
  </div>

  <main>
    <div class="stats-box">
      <p>Docce da inizio anno: <span id="tot-anno">...</span></p>
      <p>Docce in questo mese: <span id="tot-mese">...</span></p>
    </div>

    <div class="main-layout">
      <div class="months-grid" id="grid"></div>

      <div class="visual-col">
        <canvas id="docce-trend" width="400" height="250"></canvas>
        <img id="trend-image" src="" alt="Status">
      </div>
    </div>

    <div class="btn-wrap">
      <button id="btn-aggiungi">Aggiungi Doccia 🚿</button>
    </div>
  </main>

  <div class="divider-wrapper">
    <div class="linea-arancio"></div>
    <div class="cuore-div">♥</div>
    <div class="linea-arancio"></div>
  </div>

  <footer>@SbatuffoBlog 2026</footer>

  <script>
    const mesi = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
    const d = new Date();
    const curY = d.getFullYear(), curM = d.getMonth() + 1;
    let dataDocce = {};

    function render() {
      const annoData = dataDocce[curY] || {};
      let total = 0;
      for(let i=1; i<=12; i++) total += (annoData[i] || 0);

      document.getElementById('tot-anno').textContent = total;
      document.getElementById('tot-mese').textContent = annoData[curM] || 0;

      const grid = document.getElementById('grid');
      grid.innerHTML = "";
      mesi.forEach((n, i) => {
        const m = i + 1;
        const count = annoData[m] || 0;
        const card = document.createElement('div');
        card.className = 'month-card';
        
        // Bordo rosso per mese attuale
        if(m === curM) card.style.borderColor = "red";

        card.innerHTML = `<div class="month-name">${n}</div>
                          <div class="month-count" style="color:${m===curM?'red':''}"> ${count} </div>`;
        grid.appendChild(card);
      });

      // Canvas Trend
      const c = document.getElementById('docce-trend'), ctx = c.getContext('2d');
      const p = 35, w = c.width - p*2, h = c.height - p*3;
      const vals = mesi.map((_, i) => annoData[i+1] || 0);
      const max = Math.max(...vals, 5);

      ctx.clearRect(0,0,c.width,c.height);

      // Titolo DENTRO il grafico
      ctx.fillStyle = "#000";
      ctx.font = "Bold 18px Grandstander";
      ctx.textAlign = "center";
      ctx.fillText("Trend docce mese per mese", c.width/2, 25);

// ... (resto del codice invariato fino al canvas)

      // Linea Trend - MODIFICATA DA #ff802b a #2366c6
      ctx.beginPath(); 
      ctx.strokeStyle = "#2366c6"; // Colore card-blue
      ctx.lineWidth = 4;
      ctx.lineJoin = "round";
      vals.forEach((v, i) => {
        const x = p + (i/11)*w, y = p + h - (v/max)*h + 20;
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      });
      ctx.stroke();

      // Punti
      vals.forEach((v, i) => {
        const x = p + (i/11)*w, y = p + h - (v/max)*h + 20;
        ctx.beginPath();
        ctx.arc(x,y, (i+1===curM?7:4), 0, Math.PI*2);
        // Colore punti - MODIFICATO DA #ff802b a #2366c6
        ctx.fillStyle = (i+1===curM?"red":"#2366c6"); 
        ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
        
        // Etichette mesi
        ctx.fillStyle = "#333"; ctx.font = "bold 10px Arial";
        ctx.textAlign = "center";
        ctx.fillText(mesi[i].substring(0,3), x, h + p + 40);
      });

// ... (resto del codice invariato)

      document.getElementById('trend-image').src = (annoData[curM] >= (annoData[curM-1]||0)) ? "img/docciafelice.png" : "img/docciatriste.png";
    }

    // Caricamento dati
    fetch('docce.json').then(r => r.json()).then(d => { dataDocce = d; render(); });

    // Funzione Aggiorna con protezione API
    document.getElementById('btn-aggiungi').onclick = async () => {
      if(!dataDocce[curY]) dataDocce[curY] = {};
      dataDocce[curY][curM] = (dataDocce[curY][curM] || 0) + 1;
      render();

      try {
        await fetch('https://tisbatuffoblog.vercel.app/api/update_docceAPI', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'}
        });
      } catch (e) {
        console.error("Errore nel salvataggio API:", e);
      }
    };
  </script>
</body>
</html>
