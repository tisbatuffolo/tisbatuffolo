<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SbatuffoBlog - PandAgenda</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #2332bb;
  --accent: #ff4757;
  --bg: #f4f7fa;
  --text: #1a1a1a;
  --stroke: #1a1a1a;
  --export-excel: #1D6F42; 
  --c-cibo: #ffd32a; 
  --c-giretto: #ff8c00; 
  --c-girolungo: #05c46b;
  --c-evento: #575fcf; 
  --c-compleanno: #008b8b;
  --c-festa: #ff00ff; 
  --c-nessuna: #95a5a6; 
}

body { 
    font-family: 'Fredoka', sans-serif; 
    margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; 
}

header { background: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--stroke); }
header h1 { margin: 0; font-weight: 700; font-size: 1.8rem; letter-spacing: -0.5px; }
header h1 a { color: var(--primary); text-decoration: none; }

.container { width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; box-sizing: border-box; }

.nav-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
.nav-btn {
  background: var(--primary); color: white; border: 2.5px solid var(--stroke);
  width: 38px; height: 38px; border-radius: 12px; font-size: 1.2rem; cursor: pointer;
  box-shadow: 3px 3px 0 var(--stroke); transition: 0.1s; font-family: 'Fredoka', sans-serif;
}
.nav-btn:active { box-shadow: 1px 1px 0 var(--stroke); transform: translate(2px, 2px); }

#month-year { font-weight: 600; font-size: 1.5rem; text-transform: capitalize; color: var(--primary); }

.cal-wrapper {
  background: white; border-radius: 20px; padding: 8px;
  border: 3px solid var(--stroke); box-shadow: 5px 5px 0 rgba(0,0,0,0.05);
  margin-bottom: 20px;
}
table { width: 100%; border-collapse: separate; border-spacing: 4px; table-layout: fixed; }
th { color: #888; font-size: 0.8rem; padding-bottom: 5px; font-weight: 500; }
td { height: 75px; vertical-align: top; border-radius: 10px; border: 2px solid #f0f0f0; cursor: pointer; position: relative; transition: 0.2s; }

.active-day { border: 3px solid var(--primary) !important; background: #fff !important; z-index: 10; transform: scale(1.02); }

.day-box { display: flex; flex-direction: column; height: 100%; padding: 4px; box-sizing: border-box; }
.day-num { font-size: 1.1rem; font-weight: 600; }
.day-label { 
    font-size: 10px; font-weight: 600; padding: 2px 4px; border-radius: 5px;
    margin-top: auto; text-align: center; color: white;
    border: 1.5px solid var(--stroke); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.today-highlight { border: 3px solid var(--accent) !important; background-color: #fff5f5 !important; }

/* Colori Sfondi Celle */
.bg-cibo { background-color: rgba(255, 211, 42, 0.15); }
.bg-giretto { background-color: rgba(255, 140, 0, 0.15); }
.bg-girolungo { background-color: rgba(5, 196, 107, 0.15); }
.bg-evento { background-color: rgba(87, 95, 207, 0.15); }
.bg-compleanno { background-color: rgba(0, 139, 139, 0.15); }
.bg-festa { background-color: rgba(255, 0, 255, 0.15); }

/* Etichette Celle */
.lbl-cibo { background: var(--c-cibo); color: #000; }
.lbl-giretto { background: var(--c-giretto); color: #fff; }
.lbl-girolungo { background: var(--c-girolungo); color: #fff; }
.lbl-evento { background: var(--c-evento); color: #fff; }
.lbl-compleanno { background: var(--c-compleanno); color: #fff; }
.lbl-festa { background: var(--c-festa); color: #fff; }

#save-github {
  font-family: 'Fredoka', sans-serif;
  background: var(--accent); color: white; border: 3px solid var(--stroke); padding: 12px 25px;
  border-radius: 15px; font-weight: 600; display: block; margin: 0 auto 25px auto;
  box-shadow: 4px 4px 0 var(--stroke); cursor: pointer; transition: 0.1s; font-size: 1.1rem;
}

.section-title {
  font-size: 1.7rem; font-weight: 600; margin: 30px 0 15px 0; 
  border-left: 6px solid var(--primary); padding-left: 12px;
}

.activity-card {
  background: #fff; border: 2.5px solid var(--stroke); 
  border-radius: 20px; margin-bottom: 15px; position: relative;
  display: flex; align-items: center; min-height: 95px; cursor: pointer;
  transition: all 0.2s ease;
}

.activity-card.selected-card {
  border-color: var(--primary);
  box-shadow: 6px 6px 0 rgba(35, 50, 187, 0.15);
  transform: translateY(-2px);
}

.day-square { 
  width: 65px; align-self: stretch; border-right: 2.5px solid var(--stroke);
  border-top-left-radius: 17px; border-bottom-left-radius: 17px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0;
}
.day-square b { font-size: 1.5rem; line-height: 1; font-weight: 700; }
.day-square span { font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }

.activity-img { height: 85px; width: 110px; object-fit: contain; padding: 5px; }
.activity-info { flex-grow: 1; padding: 10px 40px 10px 5px; }
.activity-info b { font-size: 1.4rem; display: block; line-height: 1.1; margin-bottom: 4px; font-weight: 600; }
.activity-info .cat-wrapper { 
    display: flex; align-items: center; gap: 6px; 
    font-size: 0.85rem; color: #555; text-transform: uppercase; font-weight: 500; 
}

/* Solo icona per la ricorrenza nelle card */
.recur-tag { 
    background: #eef1ff; color: var(--primary); 
    padding: 2px 6px; border-radius: 8px; 
    border: 1.5px solid var(--primary); font-size: 0.85rem;
    display: inline-flex; align-items: center; justify-content: center;
}

.edit-pencil {
    position: absolute; top: -10px; right: -5px;
    background: var(--stroke); color: #ffd32a; 
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid white; z-index: 20; font-size: 1.2rem;
}

/* Modale */
.overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(35, 50, 187, 0.1); backdrop-filter: blur(8px); z-index: 1000;
}
.sheet {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 90%; max-width: 380px; background: white; border-radius: 28px; 
  border: 3px solid var(--stroke); overflow: hidden; box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
}
.btn-close-modal {
  position: absolute; top: 12px; right: 12px; width: 34px; height: 34px;
  background: var(--accent); color: white; border: 2px solid var(--stroke); border-radius: 50%;
  font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 30;
}
.modal-img-container { width: 100%; height: 160px; background: #fdfdfd; border-bottom: 3px solid var(--stroke); display: flex; align-items: center; justify-content: center; }
#modal-img { max-height: 85%; }
.modal-content { padding: 20px; }

.form-row { display: flex; gap: 12px; margin-bottom: 18px; }
.form-group { flex: 1; }
.form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.8rem; text-transform: uppercase; color: #777; }
.form-group input, .form-group select { 
    width: 100%; padding: 12px; border: 2.5px solid var(--stroke); 
    border-radius: 14px; font-family: 'Fredoka', sans-serif; font-weight: 500; box-sizing: border-box; font-size: 1rem;
}

.modal-btns { display: flex; gap: 12px; margin-top: 5px; }
.modal-btns button { 
    flex: 1; padding: 15px; border-radius: 15px; font-weight: 600; 
    border: 3px solid var(--stroke); cursor: pointer; font-family: 'Fredoka', sans-serif; font-size: 1rem;
    display: flex; align-items: center; justify-content: center; gap: 8px;
}
#btn-confirm { background: var(--primary); color: white; box-shadow: 4px 4px 0 var(--stroke); }
#btn-export { background: var(--export-excel); color: white; display: none; box-shadow: 4px 4px 0 var(--stroke); }

</style>
</head>

<body>
<header><h1><a href="../index.html">SbatuffoBlog - PandAgenda</a></h1></header>
<main class="container">
  <div class="nav-bar">
    <button id="prev-m" class="nav-btn">‹</button>
    <span id="month-year"></span>
    <button id="next-m" class="nav-btn">›</button>
  </div>
  
  <div class="cal-wrapper">
    <table>
      <thead><tr><th>Lun</th><th>Mar</th><th>Mer</th><th>Gio</th><th>Ven</th><th>Sab</th><th>Dom</th></tr></thead>
      <tbody id="cal-body"></tbody>
    </table>
  </div>

  <button id="save-github">Salva la PandAgenda 🚀</button>
  
  <div class="section-title">Prossime attività</div>
  <div id="act-list"></div>
</main>

<div id="modal-overlay" class="overlay">
  <div class="sheet">
    <div id="btn-close-x" class="btn-close-modal">×</div>
    <div class="modal-img-container"><img id="modal-img" src="img/nessuna.png"></div>
    <div class="modal-content">
        <div class="form-row">
            <div class="form-group">
                <label>Tipo attività</label>
                <select id="in-type">
                    <option value="">nessuna</option>
                    <option value="cibo">Cibo</option>
                    <option value="giretto">Giretto</option>
                    <option value="girolungo">Giro lungo</option>
                    <option value="evento">Evento</option>
                    <option value="compleanno">Compleanno</option>
                    <option value="festa">Festa</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ricorrenza</label>
                <select id="in-recurrence">
                    <option value="singola">Singola</option>
                    <option value="annuale">Ogni anno</option>
                </select>
            </div>
        </div>
        <div class="form-group" style="margin-bottom:20px">
            <label>Nome attività</label>
            <input id="in-name" type="text" placeholder="Cosa farà lo sbatuffolone?">
        </div>
        <div class="modal-btns">
          <button id="btn-export">Export 📅</button>
          <button id="btn-confirm">SALVA 💾</button>
        </div>
    </div>
  </div>
</div>

<script>
const today = new Date(); today.setHours(0,0,0,0);
let year = today.getFullYear(), month = today.getMonth();
let events = {};
let selectedDateStr = null, editEventKey = null;

const imgMap = { "": "img/nessuna.png", cibo: "img/cibo.png", giretto: "img/giretto.png", girolungo: "img/girolungo.png", evento: "img/evento.png", compleanno: "img/compleanno.png", festa: "img/festa.png" };
const colorMap = { "": "var(--c-nessuna)", cibo: "var(--c-cibo)", giretto: "var(--c-giretto)", girolungo: "var(--c-girolungo)", evento: "var(--c-evento)", compleanno: "var(--c-compleanno)", festa: "var(--c-festa)" };
const mesiNomi = ["gennaio", "febbraio", "marzo", "aprile", "maggio", "giugno", "luglio", "agosto", "settembre", "ottobre", "novembre", "dicembre"];

async function init() {
  try { const res = await fetch("agenda.json",{cache:"no-store"}); events = await res.json() || {}; } catch(e) { events = {}; }
  render();
}

function getEventForCalendarCell(cellDateStr) {
    if (events[cellDateStr]) return { ev: events[cellDateStr], origKey: cellDateStr };
    const [y, m, d] = cellDateStr.split("-");
    for (const [k, ev] of Object.entries(events)) {
        if (ev.ricorrenza === "annuale") {
            const [ey, em, ed] = k.split("-");
            if (em === m && ed === d && parseInt(ey) <= parseInt(y)) return { ev: ev, origKey: k }; 
        }
    }
    return null;
}

function render() {
  const body = document.getElementById("cal-body"); body.innerHTML = "";
  const first = (new Date(year, month, 1).getDay() + 6) % 7;
  const last = new Date(year, month + 1, 0).getDate();
  document.getElementById("month-year").textContent = `${mesiNomi[month]} ${year}`;

  let d = 1;
  for (let i = 0; i < 6; i++) {
    const row = document.createElement("tr");
    for (let j = 0; j < 7; j++) {
      const cell = document.createElement("td");
      if (i === 0 && j < first || d > last) { cell.style.border="none"; }
      else {
        const dateKey = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        cell.id = `td-${dateKey}`;
        const cellData = getEventForCalendarCell(dateKey);
        const ev = cellData ? cellData.ev : { nome: "", tipo: "" };
        const originalKey = cellData ? cellData.origKey : dateKey;
        cell.onclick = () => { highlightDay(dateKey); openModal(dateKey, originalKey); };
        const lblClass = ev.tipo ? `lbl-${ev.tipo}` : "lbl-nessuna";
        const bgClass = ev.nome ? (ev.tipo ? `bg-${ev.tipo}` : "bg-nessuna") : "";
        const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
        cell.innerHTML = `<div class="day-box ${bgClass} ${isToday ? 'today-highlight' : ''}"><span class="day-num">${d}</span>${ev.nome ? `<span class="day-label ${lblClass}">${ev.nome}</span>` : ''}</div>`;
        d++;
      }
      row.appendChild(cell);
    }
    body.appendChild(row); if (d > last) break;
  }
  renderList();
}

function highlightDay(key) { 
    document.querySelectorAll('td').forEach(t => t.classList.remove('active-day')); 
    const targetTd = document.getElementById(`td-${key}`);
    if(targetTd) targetTd.classList.add('active-day'); 

    document.querySelectorAll('.activity-card').forEach(c => c.classList.remove('selected-card'));
    const targetCard = document.querySelector(`.activity-card[data-key="${key}"]`);
    if(targetCard) targetCard.classList.add('selected-card');
}

function renderList() {
  const list = document.getElementById("act-list"); list.innerHTML = "";
  const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}`;
  const last = new Date(year, month + 1, 0).getDate();
  const listItems = [];
  for (let d = 1; d <= last; d++) {
    const currentKey = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    if (currentKey >= todayStr) {
        const cellData = getEventForCalendarCell(currentKey);
        if (cellData && cellData.ev.nome) listItems.push({ dateKey: currentKey, origKey: cellData.origKey, ev: cellData.ev });
    }
  }
  if(listItems.length === 0) { list.innerHTML = "<div style='text-align:center; color:#888; padding: 20px;'>Nessuna attività in programma...</div>"; return; }
  
  listItems.forEach(item => {
    const day = item.dateKey.split("-")[2];
    const card = document.createElement("div"); 
    card.className = "activity-card";
    card.setAttribute('data-key', item.dateKey); 
    const cardColor = colorMap[item.ev.tipo] || "var(--c-nessuna)";
    card.innerHTML = `
      <div class="day-square" style="background:${cardColor};"><b>${day}</b><span>${mesiNomi[month].substring(0,3)}</span></div>
      <img src="${imgMap[item.ev.tipo]}" class="activity-img">
      <div class="activity-info">
        <b>${item.ev.nome}</b>
        <div class="cat-wrapper">
            ${item.ev.tipo || 'attività'} 
            ${item.ev.ricorrenza === 'annuale' ? '<span class="recur-tag">🔁</span>' : ''}
        </div>
      </div>
      <div class="edit-pencil" onclick="event.stopPropagation(); openModal('${item.dateKey}', '${item.origKey}')">✎</div>`;
    
    card.onclick = () => { 
        highlightDay(item.dateKey); 
        document.getElementById(`td-${item.dateKey}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }); 
    };
    list.appendChild(card);
  });
}

function downloadICS(dateStr, originalKey) {
    const ev = events[originalKey];
    if (!ev || !ev.nome) return;
    const dateIcs = dateStr.replace(/-/g, "");
    const startDate = new Date(dateStr);
    const endDate = new Date(startDate); endDate.setDate(startDate.getDate() + 1);
    const dateEndStr = endDate.toISOString().slice(0, 10).replace(/-/g, "");
    const icsLines = [ "BEGIN:VCALENDAR", "VERSION:2.0", "BEGIN:VEVENT", `SUMMARY:${ev.nome}`, `DTSTART;VALUE=DATE:${dateIcs}`, `DTEND;VALUE=DATE:${dateEndStr}` ];
    if (ev.ricorrenza === "annuale") icsLines.push("RRULE:FREQ=YEARLY");
    icsLines.push("END:VEVENT", "END:VCALENDAR");
    const blob = new Blob([icsLines.join("\r\n")], { type: "text/calendar" });
    const link = document.createElement("a"); link.href = window.URL.createObjectURL(blob); link.download = `evento.ics`; link.click();
}

const modal = document.getElementById("modal-overlay");
function openModal(dateStr, originalKey) {
  selectedDateStr = dateStr; editEventKey = originalKey;
  const ev = events[editEventKey] || { nome: "", tipo: "", ricorrenza: "singola" };
  document.getElementById("in-name").value = ev.nome;
  document.getElementById("in-type").value = ev.tipo || "";
  document.getElementById("in-recurrence").value = ev.ricorrenza || "singola";
  document.getElementById("modal-img").src = imgMap[ev.tipo || ""];
  document.getElementById("btn-export").style.display = ev.nome ? "block" : "none";
  modal.style.display = "block";
}
function closeModal() { modal.style.display = "none"; }
document.getElementById("in-type").onchange = (e) => document.getElementById("modal-img").src = imgMap[e.target.value];
document.getElementById("btn-confirm").onclick = () => {
  const name = document.getElementById("in-name").value.trim(), type = document.getElementById("in-type").value, rec = document.getElementById("in-recurrence").value;
  if(name) events[editEventKey] = { nome: name, tipo: type, ricorrenza: rec }; else delete events[editEventKey];
  closeModal(); render();
};
document.getElementById("btn-close-x").onclick = closeModal;
document.getElementById("btn-export").onclick = () => downloadICS(selectedDateStr, editEventKey);
document.getElementById("prev-m").onclick = () => { month--; if(month<0){month=11;year--;} render(); };
document.getElementById("next-m").onclick = () => { month++; if(month>11){month=0;year++;} render(); };

document.getElementById("save-github").onclick = async () => {
  const btn = document.getElementById("save-github"); btn.disabled = true; btn.innerHTML = "⏳ Salvataggio...";
  try {
      const res = await fetch("https://tisbatuffoblog.vercel.app/api/update_agendaAPI", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(events) });
      if (res.ok) alert("PandAgenda salvata! 🐼"); else throw new Error();
  } catch(e) { alert("Errore salvataggio."); }
  finally { btn.disabled = false; btn.innerHTML = "Salva la PandAgenda 🚀"; }
};
init();
</script>
</body>
</html>
