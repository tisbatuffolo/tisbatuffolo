<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PandAgenda – Fixed Rounding</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #2332bb;
  --accent: #ff4757;
  --bg: #f4f7fa;
  --text: #1a1a1a;
  --stroke: #1a1a1a;
  --c-cibo: #ffd32a; --c-giretto: #ffa801; --c-girolungo: #05c46b;
  --c-evento: #575fcf; --c-compleanno: #ef5777; --c-festa: #f53b57;
}

body { font-family: 'Fredoka', sans-serif; margin: 0; background: var(--bg); color: var(--text); }

header { background: #fff; padding: 15px; text-align: center; border-bottom: 3px solid var(--stroke); }
header h1 { margin: 0; font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.6rem; color: var(--primary); }

.container { width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; box-sizing: border-box; }

.nav-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
.nav-btn {
  background: var(--primary); color: white; border: 2.5px solid var(--stroke);
  width: 38px; height: 38px; border-radius: 10px; font-size: 1.2rem; cursor: pointer;
  box-shadow: 3px 3px 0 var(--stroke);
}
#month-year { font-weight: 800; font-size: 1.3rem; text-transform: uppercase; }

/* Calendario */
.cal-wrapper {
  background: white; border-radius: 18px; padding: 8px;
  border: 3px solid var(--stroke); box-shadow: 5px 5px 0 rgba(0,0,0,0.05);
  margin-bottom: 20px;
}
table { width: 100%; border-collapse: separate; border-spacing: 3px; table-layout: fixed; }
th { color: #888; font-size: 0.7rem; padding-bottom: 5px; text-transform: uppercase; }
td { height: 75px; vertical-align: top; border-radius: 8px; border: 2px solid #f0f0f0; transition: 0.2s; cursor: pointer; }

.day-box { display: flex; flex-direction: column; height: 100%; padding: 4px; box-sizing: border-box; }
.day-num { font-size: 1rem; font-weight: 800; }
.day-label { 
    font-size: 9px; font-weight: 700; padding: 2px 4px; border-radius: 4px;
    margin-top: auto; text-align: center; color: white;
    border: 1.5px solid var(--stroke); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Colori celle */
.bg-cibo { background-color: rgba(255, 211, 42, 0.15); }
.bg-giretto { background-color: rgba(255, 168, 1, 0.15); }
.bg-girolungo { background-color: rgba(5, 196, 107, 0.15); }
.bg-evento { background-color: rgba(87, 95, 207, 0.15); }
.bg-compleanno { background-color: rgba(239, 87, 119, 0.15); }
.bg-festa { background-color: rgba(245, 59, 87, 0.15); }

.lbl-cibo { background: var(--c-cibo); color: #000; }
.lbl-giretto { background: var(--c-giretto); }
.lbl-girolungo { background: var(--c-girolungo); }
.lbl-evento { background: var(--c-evento); }
.lbl-compleanno { background: var(--c-compleanno); }
.lbl-festa { background: var(--c-festa); }

.active-day { border: 3px solid var(--primary) !important; background: #fff !important; }

/* Salva PandAgenda */
#save-github {
  background: var(--accent); color: white; border: 3px solid var(--stroke); padding: 10px 25px;
  border-radius: 12px; font-weight: 800; display: block; margin: 0 auto 25px auto;
  box-shadow: 4px 4px 0 var(--stroke); cursor: pointer; font-size: 1.05rem;
}

.section-title { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.2rem; margin-bottom: 15px; border-left: 5px solid var(--primary); padding-left: 10px; }

/* FIX: Card con stondature ripristinate */
.activity-card {
  background: #fff; border: 2.5px solid var(--stroke); 
  border-radius: 18px; /* Stondatura card principale */
  margin-bottom: 15px; position: relative; transition: 0.2s;
  display: flex; align-items: center; 
  min-height: 95px; height: auto;
}
.activity-card.selected { border-color: var(--primary); box-shadow: 4px 4px 0 rgba(35, 50, 187, 0.1); }

.day-square { 
  width: 65px; align-self: stretch; 
  border-right: 2.5px solid var(--stroke);
  /* FIX: Stondature interne che seguono la card */
  border-top-left-radius: 15px; 
  border-bottom-left-radius: 15px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0;
  overflow: hidden; 
}
.day-square b { font-size: 1.4rem; line-height: 1; }
.day-square span { font-size: 0.65rem; text-transform: uppercase; font-weight: 700; margin-top: 2px; }

.activity-img { 
  height: 90px;
  width: 130px; 
  object-fit: contain;
  padding: 5px;
  flex-shrink: 0;
}

.activity-info { 
    flex-grow: 1; 
    padding: 10px 40px 10px 8px; 
    display: flex; 
    flex-direction: column; 
    justify-content: center;
}
.activity-info b { font-size: 1.1rem; color: var(--text); line-height: 1.2; word-break: break-word; }
.activity-info span { font-size: 0.8rem; color: #888; font-weight: 600; margin-top: 3px; text-transform: lowercase; }

.edit-pencil {
    position: absolute; top: -10px; right: -5px;
    background: var(--stroke); color: #ffd32a; 
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem; cursor: pointer; border: 2px solid white;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
    z-index: 20;
}

/* Modale */
.overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1000;
}
.sheet {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 85%; max-width: 380px; background: white; border-radius: 20px; overflow: hidden; border: 3px solid var(--stroke);
}
.modal-img-container { width: 100%; height: 180px; background: #f9f9f9; border-bottom: 2.5px solid var(--stroke); display: flex; align-items: center; justify-content: center;}
#modal-img { max-height: 90%; max-width: 90%; object-fit: contain; }
.modal-content { padding: 15px; }
.form-group label { display: block; font-weight: 700; margin-bottom: 4px; font-size: 0.8rem; text-transform: uppercase; }
.form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 10px; margin-bottom: 10px; font-family: inherit; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button { flex: 1; padding: 12px; border-radius: 10px; font-weight: 800; border: 2.5 solid var(--stroke); cursor: pointer; }
#btn-confirm { background: var(--primary); color: white; }
</style>
</head>

<body>
<header><h1>PandAgenda</h1></header>
<main class="container">
  <div class="nav-bar">
    <button id="prev-m" class="nav-btn">‹</button>
    <span id="month-year"></span>
    <button id="next-m" class="nav-btn">›</button>
  </div>
  
  <div class="cal-wrapper">
    <table>
      <thead><tr><th>Lun</th><th>Mar</th><th>Mer</th><th>Gio</th><th>Ven</th><th>Sab</th><th>Dom</th></tr></thead>
      <tbody id="cal-body"></tbody>
    </table>
  </div>

  <button id="save-github">Salva la PandAgenda 🚀</button>
  
  <div class="section-title">Prossime Attività del Mese 🐼</div>
  <div id="act-list"></div>
</main>

<div id="modal-overlay" class="overlay">
  <div class="sheet">
    <div class="modal-img-container"><img id="modal-img" src="img/nessuna.png"></div>
    <div class="modal-content">
        <div class="form-group">
            <label>Categoria</label>
            <select id="in-type">
                <option value="">Nessuna</option>
                <option value="cibo">Cibo 🍕</option>
                <option value="giretto">Giretto 🚶‍♂️</option>
                <option value="girolungo">Giro lungo 🚵‍♀️</option>
                <option value="evento">Evento ✨</option>
                <option value="compleanno">Compleanno 🎂</option>
                <option value="festa">Festa 🥳</option>
            </select>
        </div>
        <div class="form-group">
            <label>Nome Evento</label>
            <input id="in-name" type="text" placeholder="Scrivi qui...">
        </div>
        <div class="modal-btns">
          <button id="btn-cancel">CHIUDI</button>
          <button id="btn-confirm">CONFERMA</button>
        </div>
    </div>
  </div>
</div>

<script>
const today = new Date();
let year = today.getFullYear();
let month = today.getMonth();
let events = {};
let selectedKey = null;

const imgMap = {
    "": "img/nessuna.png", cibo: "img/cibo.png", giretto: "img/giretto.png", 
    girolungo: "img/girolungo.png", evento: "img/evento.png", compleanno: "img/compleanno.png", festa: "img/festa.png"
};

const colorMap = {
    cibo: "var(--c-cibo)", giretto: "var(--c-giretto)", girolungo: "var(--c-girolungo)",
    evento: "var(--c-evento)", compleanno: "var(--c-compleanno)", festa: "var(--c-festa)"
};

const mesiNomi = ["gennaio", "febbraio", "marzo", "aprile", "maggio", "giugno", "luglio", "agosto", "settembre", "ottobre", "novembre", "dicembre"];

async function init() {
  try {
    const res = await fetch("agenda.json",{cache:"no-store"});
    events = await res.json() || {};
  } catch(e) { events = {}; }
  render();
}

function render() {
  const body = document.getElementById("cal-body");
  body.innerHTML = "";
  const first = (new Date(year, month, 1).getDay() + 6) % 7;
  const last = new Date(year, month + 1, 0).getDate();
  document.getElementById("month-year").textContent = `${mesiNomi[month]} ${year}`;

  let d = 1;
  for (let i = 0; i < 6; i++) {
    const row = document.createElement("tr");
    for (let j = 0; j < 7; j++) {
      const cell = document.createElement("td");
      if (i === 0 && j < first || d > last) { cell.style.border="none"; cell.style.background="transparent"; }
      else {
        const key = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        cell.id = `td-${key}`;
        cell.onclick = () => openModal(key);
        const ev = events[key] || { nome: "", tipo: "" };
        const lblClass = ev.tipo ? `lbl-${ev.tipo}` : "";
        const bgClass = ev.tipo ? `bg-${ev.tipo}` : "";
        cell.innerHTML = `
          <div class="day-box ${bgClass}">
            <span class="day-num">${d}</span>
            ${ev.nome ? `<span class="day-label ${lblClass}">${ev.nome}</span>` : ''}
          </div>`;
        d++;
      }
      row.appendChild(cell);
    }
    body.appendChild(row);
    if (d > last) break;
  }
  renderList();
}

function renderList() {
  const list = document.getElementById("act-list");
  list.innerHTML = "";
  const keys = Object.keys(events).filter(k => {
    const [y, m] = k.split("-").map(Number);
    return y === year && (m-1) === month && events[k].nome;
  }).sort();

  keys.forEach(k => {
    const ev = events[k];
    const day = k.split("-")[2];
    const card = document.createElement("div");
    card.className = "activity-card";
    card.id = `card-${k}`;
    const cardColor = colorMap[ev.tipo] || "#eee";
    
    card.innerHTML = `
      <div class="day-square" style="background:${cardColor}">
        <b>${day}</b>
        <span>${mesiNomi[month].substring(0,3)}</span>
      </div>
      <img src="${imgMap[ev.tipo]}" class="activity-img">
      <div class="activity-info">
        <b>${ev.nome}</b>
        <span>${ev.tipo || 'evento'}</span>
      </div>
      <div class="edit-pencil" onclick="event.stopPropagation(); openModal('${k}')">✎</div>
    `;
    card.onclick = () => {
        document.querySelectorAll('td').forEach(t => t.classList.remove('active-day'));
        document.querySelectorAll('.activity-card').forEach(c => c.classList.remove('selected'));
        document.getElementById(`td-${k}`)?.classList.add('active-day');
        card.classList.add('selected');
    };
    list.appendChild(card);
  });
}

function openModal(key) {
  selectedKey = key;
  const ev = events[key] || { nome: "", tipo: "" };
  document.getElementById("in-name").value = ev.nome;
  document.getElementById("in-type").value = ev.tipo || "";
  document.getElementById("modal-img").src = imgMap[ev.tipo || ""];
  document.getElementById("modal-overlay").style.display = "block";
}

document.getElementById("in-type").onchange = (e) => {
    document.getElementById("modal-img").src = imgMap[e.target.value];
};

document.getElementById("btn-confirm").onclick = () => {
  events[selectedKey] = { nome: document.getElementById("in-name").value, tipo: document.getElementById("in-type").value };
  document.getElementById("modal-overlay").style.display = "none";
  render();
};

document.getElementById("btn-cancel").onclick = () => document.getElementById("modal-overlay").style.display = "none";
document.getElementById("prev-m").onclick = () => { month--; if(month<0){month=11;year--;} render(); };
document.getElementById("next-m").onclick = () => { month++; if(month>11){month=0;year++;} render(); };

init();
</script>
</body>
</html>
