<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SbatuffoBlog - PandAgenda</title>

<link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #00244d; /* Blu PandAgenda */
  --sbatuffo-blue: #0000ff; /* Blu SbatuffoBlog */
  --accent: #ff4757;
  --bg-soft: #fdfdfd;
  --text: #1a1a1a;
  --stroke: #1a1a1a;
  --light-blue-border: #bde0fe;
  --heart-red: #ff4d4d;
  --export-excel: #1D6F42;
  
  --c-cibo: #ffd32a; 
  --c-giretto: #ff8c00; 
  --c-girolungo: #05c46b;
  --c-evento: #575fcf; 
  --c-compleanno: #a55eea; /* Violetto */
  --c-festa: #ff00ff; 
  --c-nessuna: #95a5a6;
}

body { 
    font-family: 'Fredoka', sans-serif; 
    margin: 0; 
    background: var(--bg-soft); 
    color: var(--text); 
    overflow-x: hidden; 
}

/* --- HEADER --- */
header {
  background: #fff;
  padding: 25px 10px 5px;
  text-align: center;
  position: relative;
}

.header-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  position: relative;
}

.home-link-img {
  position: absolute;
  left: 20px;
  top: 5px;
  transition: transform 0.2s ease;
  display: flex;
  align-items: center;
}
.home-link-img:hover { transform: scale(1.1); }
.home-link-img img { width: clamp(70px, 12vw, 100px); height: auto; }

.brand-title {
  font-family: 'Grandstander', cursive;
  font-weight: 900;
  font-size: clamp(2.2rem, 8vw, 4.2rem);
  color: var(--sbatuffo-blue);
  margin: 0;
  line-height: 1;
  text-decoration: none;
}

.brand-subtitle {
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(0.9rem, 3vw, 1.2rem);
  color: var(--primary);
  font-weight: 700;
  margin-top: 5px;
  letter-spacing: 1.5px;
  text-transform: lowercase;
}

/* --- DIVISORI --- */
.section-divider {
  max-width: 200px;
  height: 3px;
  background: var(--primary);
  margin: 30px auto;
  border-radius: 50px;
  position: relative;
  clear: both;
}
.section-divider::after {
  content: "♥";
  position: absolute;
  top: -14px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg-soft);
  padding: 0 15px;
  color: var(--heart-red);
  font-size: 1.5rem;
}

.container { width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; box-sizing: border-box; }

.nav-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }

.nav-btn {
  background: var(--primary); 
  color: white; 
  border: 2.5px solid var(--stroke);
  width: 38px; height: 38px; border-radius: 12px; font-size: 1.2rem; cursor: pointer;
  box-shadow: 3px 3px 0 var(--stroke); transition: 0.1s;
}

#month-year { 
  font-weight: 700; 
  font-size: 1.5rem; 
  text-transform: capitalize; 
  color: var(--primary); 
  font-family: 'Grandstander', cursive;
}

.cal-wrapper {
  background: white; border-radius: 20px; padding: 8px;
  border: 3px solid var(--stroke); box-shadow: 5px 5px 0 rgba(0,0,0,0.05);
  margin-bottom: 20px;
}
table { width: 100%; border-collapse: separate; border-spacing: 4px; table-layout: fixed; }
th { color: #888; font-size: 0.8rem; padding-bottom: 5px; font-weight: 500; }
td { height: 65px; vertical-align: top; border-radius: 10px; border: 2px solid #f0f0f0; cursor: pointer; position: relative; transition: 0.2s; overflow: hidden; }

.active-day { border: 3px solid var(--primary) !important; background: #fff !important; z-index: 10; transform: scale(1.02); }

.day-box { display: flex; flex-direction: column; height: 100%; padding: 4px; box-sizing: border-box; gap: 2px; }
.day-num { font-size: 1.1rem; font-weight: 600; margin-bottom: 2px; }

/* Labels calendario */
.day-label { 
    font-size: 9px; font-weight: 600; padding: 1px 3px; border-radius: 4px;
    text-align: center; color: white; border: 1px solid var(--stroke);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: block; width: 100%; box-sizing: border-box;
}

.today-highlight { border: 3px solid var(--accent) !important; background-color: #fff5f5 !important; }

/* Colori Labels */
.lbl-cibo { background: var(--c-cibo); color: #000; }
.lbl-giretto { background: var(--c-giretto); color: #fff; }
.lbl-girolungo { background: var(--c-girolungo); color: #fff; }
.lbl-evento { background: var(--c-evento); color: #fff; }
.lbl-compleanno { background: var(--c-compleanno); color: #fff; }
.lbl-festa { background: var(--c-festa); color: #fff; }
.lbl-nessuna { background: var(--c-nessuna); color: #fff; }

/* Backgrounds celle */
.bg-compleanno { background-color: rgba(165, 94, 234, 0.1); }
.bg-nessuna { background-color: rgba(149, 165, 166, 0.1); }

#save-github {
  font-family: 'Grandstander', cursive;
  background: var(--accent); color: white; border: 3px solid var(--stroke); padding: 12px 25px;
  border-radius: 15px; font-weight: 900; display: block; margin: 0 auto 25px auto;
  box-shadow: 4px 4px 0 var(--stroke); cursor: pointer; transition: 0.1s; font-size: 1.1rem;
}

.section-title {
  font-family: 'Grandstander', cursive;
  font-size: 1.7rem; font-weight: 900; 
  margin: 50px 0 15px 0; 
  border-left: 6px solid var(--primary); padding-left: 12px;
  color: var(--primary);
}

/* Attività Cards */
.activity-card {
  background: #fff; border: 2.5px solid var(--stroke); 
  border-radius: 20px; margin-bottom: 15px; position: relative;
  display: flex; align-items: center; min-height: 95px; cursor: pointer;
  transition: all 0.2s ease;
}
.activity-card.selected-card { 
    border-color: var(--primary); 
    box-shadow: 6px 6px 0 rgba(0, 36, 77, 0.15); 
    transform: translateY(-2px); 
}
.day-square { 
  width: 65px; align-self: stretch; border-right: 2.5px solid var(--stroke);
  border-top-left-radius: 17px; border-bottom-left-radius: 17px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0;
}
.day-square b { font-size: 1.5rem; font-weight: 700; }
.day-square span { font-size: 0.7rem; text-transform: uppercase; font-weight: 600; }
.activity-img { height: 85px; width: 110px; object-fit: contain; padding: 5px; }
.activity-info { flex-grow: 1; padding: 10px 40px 10px 5px; }
.activity-info b { font-size: 1.4rem; display: block; line-height: 1.1; margin-bottom: 4px; font-weight: 600; }
.recur-tag { background: #eef1ff; color: var(--primary); padding: 2px 8px; border-radius: 8px; border: 1.5px solid var(--primary); font-size: 0.75rem; font-weight: 600; }

.edit-pencil {
    position: absolute; top: -10px; right: -5px;
    background: var(--stroke); color: #ffd32a; 
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid white; z-index: 20; font-size: 1.2rem;
}

/* MODALE */
.overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 36, 77, 0.1); backdrop-filter: blur(8px); z-index: 1000;
}
.sheet {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 90%; max-width: 380px; background: white; border-radius: 28px; 
  border: 3px solid var(--stroke); overflow: hidden; box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
}
.btn-close-modal {
  position: absolute; top: 12px; right: 12px; width: 34px; height: 34px;
  background: var(--accent); color: white; border: 2px solid var(--stroke); border-radius: 50%;
  font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 30;
}
.btn-new-event {
  position: absolute; top: 12px; left: 12px; height: 34px;
  background: var(--primary); color: white; border: 2px solid var(--stroke);
  border-radius: 10px; font-weight: 600; font-size: 0.8rem; padding: 0 15px;
  display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 30;
}

.modal-img-container { width: 100%; height: 160px; background: #fdfdfd; border-bottom: 3px solid var(--stroke); display: flex; align-items: center; justify-content: center; }
#modal-img { max-height: 85%; }
.modal-content { padding: 20px; }

.form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.8rem; text-transform: uppercase; color: #777; }
.form-group input, .form-group select { 
    width: 100%; padding: 12px; border: 2.5px solid var(--stroke); 
    border-radius: 14px; font-family: 'Fredoka', sans-serif; font-weight: 500; box-sizing: border-box; font-size: 1rem;
}

.modal-btns { display: flex; gap: 12px; margin-top: 5px; }
.modal-btns button { 
    flex: 1; padding: 15px; border-radius: 15px; font-weight: 600; 
    border: 3px solid var(--stroke); cursor: pointer; font-family: 'Fredoka', sans-serif; font-size: 1rem;
}
#btn-confirm { background: var(--sbatuffo-blue); color: white; box-shadow: 4px 4px 0 var(--stroke); } 

/* FOOTER */
footer { background: #fff; padding: 20px 10px 40px; }
.footer-container { display: flex; justify-content: center; align-items: center; position: relative; max-width: 1100px; margin: 0 auto; }
.footer-home { position: absolute; left: 20px; }
.footer-home img { width: clamp(50px, 8vw, 70px); height: auto; }
.footer-text { font-family: 'Grandstander', cursive; font-weight: 600; font-size: 1.2rem; color: #444; }
</style>
</head>

<body>
<header>
  <div class="header-container">
    <a href="../index.html" class="home-link-img"><img src="img/home.png" alt="Home"></a>
    <div class="brand-wrapper">
      <a href="../index.html" class="brand-title">SbatuffoBlog</a>
      <div class="brand-subtitle">PandAgenda</div>
    </div>
  </div>
</header>

<div class="section-divider"></div>

<main class="container">
  <div class="nav-bar">
    <button id="prev-m" class="nav-btn">‹</button>
    <span id="month-year"></span>
    <button id="next-m" class="nav-btn">›</button>
  </div>
  
  <div class="cal-wrapper">
    <table>
      <thead><tr><th>Lun</th><th>Mar</th><th>Mer</th><th>Gio</th><th>Ven</th><th>Sab</th><th>Dom</th></tr></thead>
      <tbody id="cal-body"></tbody>
    </table>
  </div>

  <button id="save-github">Salva la PandAgenda 🚀</button>
  
  <div class="section-title">Prossime attività</div>
  <div id="act-list"></div>
</main>

<div class="section-divider"></div>

<footer>
    <div class="footer-container">
    <a href="../index.html" class="footer-home"><img src="img/home.png" alt="Home"></a>
    <div class="footer-text">@SbatuffoBlog 2026</div>
  </div>
</footer>

<div id="modal-overlay" class="overlay">
  <div class="sheet">
    <div id="btn-new-event" class="btn-new-event">Nuovo</div>
    <div id="btn-close-x" class="btn-close-modal">×</div>
    <div class="modal-img-container"><img id="modal-img" src="img/nessuna.png"></div>
    <div class="modal-content">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="form-group" style="flex:1">
                <label>Tipo</label>
                <select id="in-type">
                    <option value="">nessuna</option>
                    <option value="cibo">Cibo</option>
                    <option value="giretto">Giretto</option>
                    <option value="girolungo">Giro lungo</option>
                    <option value="evento">Evento</option>
                    <option value="compleanno">Compleanno</option>
                    <option value="festa">Festa</option>
                </select>
            </div>
            <div class="form-group" style="flex:1">
                <label>Ricorrenza</label>
                <select id="in-recurrence">
                    <option value="singola">Singola</option>
                    <option value="annuale">Ogni anno</option>
                </select>
            </div>
        </div>
        <div class="form-group" style="margin-bottom:20px">
            <label>Nome attività</label>
            <input id="in-name" type="text" placeholder="Cosa farà lo sbatuffolone?">
        </div>
        <div class="modal-btns">
          <button id="btn-confirm">💾 SALVA</button>
        </div>
    </div>
  </div>
</div>

<script>
const today = new Date(); today.setHours(0,0,0,0);
let year = today.getFullYear(), month = today.getMonth();
let events = {}; 
let selectedDateStr = null, editEventIdx = null;

const imgMap = { "": "img/nessuna.png", cibo: "img/cibo.png", giretto: "img/giretto.png", girolungo: "img/girolungo.png", evento: "img/evento.png", compleanno: "img/compleanno.png", festa: "img/festa.png" };
const colorMap = { "": "var(--c-nessuna)", cibo: "var(--c-cibo)", giretto: "var(--c-giretto)", girolungo: "var(--c-girolungo)", evento: "var(--c-evento)", compleanno: "var(--c-compleanno)", festa: "var(--c-festa)" };
const mesiNomi = ["gennaio", "febbraio", "marzo", "aprile", "maggio", "giugno", "luglio", "agosto", "settembre", "ottobre", "novembre", "dicembre"];

async function init() {
  try { 
    const res = await fetch("agenda.json",{cache:"no-store"}); 
    const rawData = await res.json() || {}; 
    for (let k in rawData) events[k] = Array.isArray(rawData[k]) ? rawData[k] : [rawData[k]];
  } catch(e) { events = {}; }
  render();
}

function getEventsForDate(cellDateStr) {
    let result = [];
    if (events[cellDateStr]) events[cellDateStr].forEach((ev, idx) => result.push({ ev, origKey: cellDateStr, idx }));
    const [y, m, d] = cellDateStr.split("-");
    for (const [k, evList] of Object.entries(events)) {
        if (k === cellDateStr) continue; 
        evList.forEach((ev, idx) => {
            if (ev.ricorrenza === "annuale") {
                const [ey, em, ed] = k.split("-");
                if (em === m && ed === d && parseInt(ey) <= parseInt(y)) result.push({ ev, origKey: k, idx });
            }
        });
    }
    return result;
}

function render() {
  const body = document.getElementById("cal-body"); body.innerHTML = "";
  const first = (new Date(year, month, 1).getDay() + 6) % 7;
  const last = new Date(year, month + 1, 0).getDate();
  document.getElementById("month-year").textContent = `${mesiNomi[month]} ${year}`;

  let d = 1;
  for (let i = 0; i < 6; i++) {
    const row = document.createElement("tr");
    for (let j = 0; j < 7; j++) {
      const cell = document.createElement("td");
      if (i === 0 && j < first || d > last) { cell.style.border="none"; }
      else {
        const dateKey = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        cell.id = `td-${dateKey}`;
        const dayEvents = getEventsForDate(dateKey);
        const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
        
        let labelsHtml = "";
        dayEvents.forEach(item => {
            const lblClass = item.ev.tipo ? `lbl-${item.ev.tipo}` : "lbl-nessuna";
            labelsHtml += `<span class="day-label ${lblClass}">${item.ev.nome}</span>`;
        });

        const cellBgClass = (dayEvents.length > 0) ? (dayEvents[0].ev.tipo === "compleanno" ? "bg-compleanno" : (dayEvents[0].ev.tipo === "" ? "bg-nessuna" : "")) : "";

        cell.onclick = () => { 
            highlightDay(dateKey); 
            if (dayEvents.length > 0) {
                // Se ci sono eventi, apre il primo (anche se ricorsivo futuro)
                openModal(dayEvents[0].origKey, dayEvents[0].idx, dateKey);
            } else {
                openModal(dateKey); 
            }
        };
        
        cell.innerHTML = `<div class="day-box ${cellBgClass} ${isToday ? 'today-highlight' : ''}"><span class="day-num">${d}</span>${labelsHtml}</div>`;
        d++;
      }
      row.appendChild(cell);
    }
    body.appendChild(row); if (d > last) break;
  }
  renderList();
}

function highlightDay(key) { 
    document.querySelectorAll('td').forEach(t => t.classList.remove('active-day')); 
    document.querySelectorAll('.activity-card').forEach(c => c.classList.remove('selected-card'));
    document.getElementById(`td-${key}`)?.classList.add('active-day'); 
    document.querySelectorAll(`.activity-card[data-key="${key}"]`).forEach(c => c.classList.add('selected-card'));
}

function renderList() {
  const list = document.getElementById("act-list"); list.innerHTML = "";
  const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, "0")}-${String(today.getDate()).padStart(2, "0")}`;
  const last = new Date(year, month + 1, 0).getDate();
  const listItems = [];

  for (let d = 1; d <= last; d++) {
    const currentKey = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    if (currentKey >= todayStr) {
        const dayEvents = getEventsForDate(currentKey);
        dayEvents.forEach(item => listItems.push({ dateKey: currentKey, ...item }));
    }
  }

  if(listItems.length === 0) { list.innerHTML = "<div style='text-align:center; color:#888; padding: 20px;'>Nessuna attività...</div>"; return; }
  
  listItems.forEach(item => {
    const card = document.createElement("div"); 
    card.className = "activity-card";
    card.setAttribute('data-key', item.dateKey); 
    const color = colorMap[item.ev.tipo] || "var(--c-nessuna)";
    
    card.innerHTML = `
      <div class="day-square" style="background:${color};"><b>${item.dateKey.split("-")[2]}</b><span>${mesiNomi[month].substring(0,3)}</span></div>
      <img src="${imgMap[item.ev.tipo]}" class="activity-img">
      <div class="activity-info">
        <b>${item.ev.nome}</b>
        <div style="font-size:0.8rem; color:#666;">${item.ev.tipo || 'attività'} ${item.ev.ricorrenza === 'annuale' ? '<span class="recur-tag">ANNUALE</span>' : ''}</div>
      </div>
      <div class="edit-pencil" onclick="event.stopPropagation(); openModal('${item.origKey}', ${item.idx})">✎</div>`;
    
    card.onclick = () => {
        highlightDay(item.dateKey);
        document.getElementById(`td-${item.dateKey}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };
    list.appendChild(card);
  });
}

const modal = document.getElementById("modal-overlay");
const btnNew = document.getElementById("btn-new-event");

// Aggiunto targetDate per gestire il tasto "Nuovo" sui giorni futuri
function openModal(dateStr, idx = null, targetDate = null) {
  selectedDateStr = dateStr;
  editEventIdx = idx;
  
  // Mostra tasto nuovo se stiamo visualizzando un evento esistente
  if (idx !== null) {
      btnNew.style.display = "flex";
      // Se clicchiamo "Nuovo", la data di destinazione deve essere quella cliccata sul calendario
      btnNew.onclick = () => openModal(targetDate || dateStr, null);
  } else {
      btnNew.style.display = "none";
  }

  const evList = events[dateStr] || [];
  const ev = (idx !== null && evList[idx]) ? evList[idx] : { nome: "", tipo: "", ricorrenza: "singola" };
  
  document.getElementById("in-name").value = ev.nome;
  document.getElementById("in-type").value = ev.tipo || "";
  document.getElementById("in-recurrence").value = ev.ricorrenza || "singola";
  document.getElementById("modal-img").src = imgMap[ev.tipo || ""];
  modal.style.display = "block";
}

document.getElementById("btn-confirm").onclick = () => {
  const name = document.getElementById("in-name").value.trim();
  const type = document.getElementById("in-type").value;
  const rec = document.getElementById("in-recurrence").value;
  
  if (!events[selectedDateStr]) events[selectedDateStr] = [];
  
  if (name) {
      const newEv = { nome: name, tipo: type, ricorrenza: rec };
      if (editEventIdx !== null) events[selectedDateStr][editEventIdx] = newEv;
      else events[selectedDateStr].push(newEv);
  } else if (editEventIdx !== null) {
      events[selectedDateStr].splice(editEventIdx, 1);
      if (events[selectedDateStr].length === 0) delete events[selectedDateStr];
  }
  
  modal.style.display = "none";
  render();
};

document.getElementById("in-type").onchange = (e) => document.getElementById("modal-img").src = imgMap[e.target.value];
document.getElementById("btn-close-x").onclick = () => modal.style.display = "none";
document.getElementById("prev-m").onclick = () => { month--; if(month<0){month=11;year--;} render(); };
document.getElementById("next-m").onclick = () => { month++; if(month>11){month=0;year++;} render(); };

document.getElementById("save-github").onclick = async () => {
  const btn = document.getElementById("save-github"); btn.disabled = true; btn.innerHTML = "⏳ Salvataggio...";
  try {
      const res = await fetch("https://tisbatuffoblog.vercel.app/api/update_agendaAPI", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(events) });
      if (res.ok) alert("PandAgenda salvata! 🐼"); else throw new Error();
  } catch(e) { alert("Errore salvataggio."); }
  finally { btn.disabled = false; btn.innerHTML = "Salva la PandAgenda 🚀"; }
};

init();
</script>
</body>
</html>
