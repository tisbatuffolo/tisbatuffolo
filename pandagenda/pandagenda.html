<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Pandagenda</title>
  <style>
    body { font-family: Arial, sans-serif; }
    header h1 { text-align:center; color:#2332bb; }
    .calendar-container { max-width:900px; margin:30px auto; }
    table { width:100%; border-collapse:collapse; }
    th, td { border:1px solid #ccc; height:80px; vertical-align:top; padding:4px; text-align:center; }
    th { background:#2366c6; color:white; }
    button { padding:6px 12px; margin:6px; }
  </style>
</head>

<body>
<header>
  <h1>SbatuffoBlog – Pandagenda</h1>
</header>

<main class="calendar-container">
  <div>
    <button id="prev-month">&lt;</button>
    <span id="month-year"></span>
    <button id="next-month">&gt;</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Lun</th><th>Mar</th><th>Mer</th>
        <th>Gio</th><th>Ven</th><th>Sab</th><th>Dom</th>
      </tr>
    </thead>
    <tbody id="calendar-body"></tbody>
  </table>

  <button id="save-github">Salva Pandagenda</button>

  <h3>Attività del mese</h3>
  <ul id="activities-list"></ul>
</main>

<footer>© 2026 Il Panda Blog</footer>

<script>
  const today = new Date();
  let year = today.getFullYear();
  let month = today.getMonth();

  const calendarBody = document.getElementById("calendar-body");
  const monthYear = document.getElementById("month-year");
  const activities = document.getElementById("activities-list");

  // ✅ UNICA fonte dati in memoria
  let events = {};

  // ✅ carica agenda.json (source of truth)
  async function loadAgenda() {
    try {
      const res = await fetch("agenda.json", { cache: "no-store" });
      events = res.ok ? await res.json() : {};
    } catch {
      events = {};
    }
  }

  function generateCalendar(y, m) {
    calendarBody.innerHTML = "";
    activities.innerHTML = "";

    const firstDay = (new Date(y, m, 1).getDay() + 6) % 7;
    const daysInMonth = new Date(y, m + 1, 0).getDate();

    monthYear.textContent =
      new Date(y, m).toLocaleString("it-IT", { month: "long", year: "numeric" });

    let date = 1;
    for (let i = 0; i < 6; i++) {
      const row = document.createElement("tr");
      for (let j = 0; j < 7; j++) {
        const cell = document.createElement("td");

        if ((i === 0 && j < firstDay) || date > daysInMonth) {
          cell.textContent = "";
        } else {
          const key = `${y}-${String(m+1).padStart(2,"0")}-${String(date).padStart(2,"0")}`;

          const d = document.createElement("div");
          d.textContent = date;
          d.style.fontWeight = "bold";

          const ev = document.createElement("div");
          ev.contentEditable = true;
          ev.textContent = events[key] || "";

          ev.oninput = () => {
            events[key] = ev.textContent;
            updateActivities();
          };

          cell.append(d, ev);
          date++;
        }
        row.appendChild(cell);
      }
      calendarBody.appendChild(row);
    }
    updateActivities();
  }

  function updateActivities() {
    activities.innerHTML = "";
    let any = false;

    for (const k in events) {
      if (events[k]) {
        const li = document.createElement("li");
        li.textContent = `${k}: ${events[k]}`;
        activities.appendChild(li);
        any = true;
      }
    }
    if (!any) activities.innerHTML = "<li>Nessuna</li>";
  }

  document.getElementById("prev-month").onclick = () => {
    month--; if (month < 0) { month = 11; year--; }
    generateCalendar(year, month);
  };

  document.getElementById("next-month").onclick = () => {
    month++; if (month > 11) { month = 0; year++; }
    generateCalendar(year, month);
  };

  document.getElementById("save-github").onclick = async () => {
    await fetch(
      "https://tisbatuffoblog.vercel.app/api/update_agendaAPI",
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(events)
      }
    );
    alert("Agenda salvata");
  };

  // ✅ INIT SICURO
  (async () => {
    await loadAgenda();
    generateCalendar(year, month);
  })();
</script>
</body>
</html>
