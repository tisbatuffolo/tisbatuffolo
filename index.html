<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SbatuffoBlog - Home</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;900&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --main-blue: #0000ff;
      --light-blue-border: #bde0fe;
      --bg-soft: #fdfdfd;
      --heart-red: #ff4d4d;
    }

    body {
      margin: 0;
      font-family: 'Fredoka', sans-serif;
      background-color: var(--bg-soft);
      color: #222;
      overflow-x: hidden;
    }

    /* --- HEADER --- */
    header {
      padding: 25px 10px 5px;
      text-align: center;
      background: #fff;
    }

    .header-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      position: relative;
    }

    .side-heart {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: var(--heart-red);
      animation: heartbeat 1.5s infinite ease-in-out;
      position: relative;
      user-select: none;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .brand-title {
      font-family: 'Grandstander', cursive;
      font-weight: 900;
      font-size: clamp(2rem, 7vw, 4rem);
      color: var(--main-blue);
      margin: 0;
      line-height: 1;
    }

    .brand-subtitle {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      color: var(--light-blue-border);
      font-weight: 700;
      margin-top: 5px;
      letter-spacing: 1.5px;
      text-transform: lowercase;
      min-height: 1.5em; /* Previene saltelli se la frase è vuota inizialmente */
    }

    /* --- DIVISORI --- */
    .section-divider {
      max-width: 200px;
      height: 3px;
      background: var(--light-blue-border);
      margin: 30px auto;
      border-radius: 50px;
      position: relative;
    }
    .section-divider::after {
      content: "♥";
      position: absolute;
      top: -14px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg-soft);
      padding: 0 15px;
      color: var(--heart-red);
      font-size: 1.5rem;
    }

    /* --- SLIDER --- */
    .slider-box {
      width: 94%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      position: relative;
      /* Fix per stabilità scroll mobile */
      touch-action: pan-y; 
      -webkit-backface-visibility: hidden;
    }
    .slider-box img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; opacity: 0; transition: opacity 1.2s ease-in-out;
      will-change: opacity;
    }
    .slider-box img.active { opacity: 1; }

    /* --- GRID CARD --- */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 0 10px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      border: 1.5px solid var(--light-blue-border);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); border-color: var(--main-blue); }
    .card-info { padding: 12px 5px 0 5px; text-align: center; }
    .card-title { font-weight: 700; font-size: clamp(0.65rem, 2.5vw, 0.9rem); text-transform: uppercase; margin-bottom: 5px; }
    .color-line { height: 4px; width: 25px; margin: 0 auto 10px; border-radius: 10px; }
    .card-img { width: 100%; aspect-ratio: 1.3 / 1; overflow: hidden; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }

    .c1 { background: #ff5e5e; } .c2 { background: #5eb5ff; } .c3 { background: #ffde59; }
    .c4 { background: #00cec9; } .c5 { background: #00244d; } .c6 { background: #ff802b; }
    .c7 { background: #f13bd2; } .c8 { background: #55ef8b; } .c9 { background: #efaae0; }

    /* --- TIMER SECTION --- */
    .timer-section {
      text-align: center;
      padding-bottom: 20px;
    }

    .timer-section h2 {
      font-family: 'Grandstander';
      color: var(--main-blue);
      margin: 0 0 15px 0;
      font-size: 1.6rem;
    }

    .timer-wrap {
      display: flex;
      justify-content: center;
      gap: 12px;
      perspective: 1000px;
    }

    .pulse-wrapper {
      animation: heartbeat 1.5s infinite ease-in-out;
    }

    .heart-flip {
      width: 100px;
      height: 100px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .heart-flip.flipped { 
      transform: rotateY(180deg); 
    }

    .heart-front, .heart-back {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;     
      background: #eff7ff;
      clip-path: path('M50 85 C 30 70, 15 55, 15 38 C 15 25, 25 18, 38 18 C 45 18, 48 22, 50 25 C 52 22, 55 18, 62 18 C 75 18, 85 25, 85 38 C 85 55, 70 70, 50 85');
    }

    .heart-back {
      background: var(--main-blue);
      color: #fff;
      transform: rotateY(180deg);
      font-family: 'Grandstander', cursive;
      font-size: 2.5rem;
      padding-bottom: 12px; /* Allineamento ottico TVB */
      box-sizing: border-box;
    }

    .heart-front {
      padding-bottom: 15px; /* Allineamento ottico Numeri */
      box-sizing: border-box;
    }

    .val { 
      font-size: 1.8rem; 
      font-weight: 900; 
      color: var(--main-blue); 
      margin: 0;
      line-height: 1;
    }
    .lbl { 
      font-size: 0.65rem; 
      text-transform: uppercase; 
      font-weight: 700; 
      color: #666;
      margin-top: 2px;
    }

    #anniversary-msg {
      margin-top: 20px;
      font-weight: 700;
      color: var(--light-blue-border);
      font-size: 1rem;
      min-height: 1.2em;
    }

    /* --- FOOTER --- */
    footer {
      text-align: center;
      padding: 20px 10px 40px;
      font-family: 'Fredoka', sans-serif;
      color: #aaa;
      font-size: 0.9rem;
    }

    @media (max-width: 450px) {
      .timer-wrap { gap: 6px; }
      .heart-flip { width: 90px; height: 90px; }
      .val { font-size: 1.5rem; }
      .heart-back { font-size: 2.2rem; padding-bottom: 14px; }
      .heart-front { padding-bottom: 18px; } /* Centratura mobile migliorata */
      .brand-title { font-size: 2.2rem; }
      .header-container { gap: 15px; }
    }

    .firework-particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <div class="side-heart" id="h-left">♥</div>
      <div class="brand-wrapper">
        <h1 class="brand-title">SbatuffoBlog</h1>
        <div class="brand-subtitle" id="dynamic-subtitle">pandosamente insieme</div>
      </div>
      <div class="side-heart" id="h-right">♥</div>
    </div>
  </header>

  <div class="section-divider"></div>

  <main>
    <section class="slider-box">
      <img src="img/ioete1.jpg" alt="1" class="active">
      <img src="img/ioete2.jpg" alt="2">
      <img src="img/ioete3.jpg" alt="3">
    </section>

    <div class="section-divider"></div>

    <section class="grid-container">
      <a href="fotopuzzle/fotopuzzle.html" class="card">
        <div class="card-info"><div class="card-title">Fotopuzzle</div><div class="color-line c1"></div></div>
        <div class="card-img"><img src="img/fotopuzzle.jpg"></div>
      </a>
      <a href="girettimap/girettimap.html" class="card">
        <div class="card-info"><div class="card-title">Giretti</div><div class="color-line c2"></div></div>
        <div class="card-img"><img src="img/girettimap.jpg"></div>
      </a>
      <a href="pandaccessori/pandaccessori.html" class="card">
        <div class="card-info"><div class="card-title">Pandaccessori</div><div class="color-line c3"></div></div>
        <div class="card-img"><img src="img/pandaccessori.jpg"></div>
      </a>
      <a href="pandosita/pandosita.html" class="card">
        <div class="card-info"><div class="card-title">Pandosità</div><div class="color-line c4"></div></div>
        <div class="card-img"><img src="img/pandosita.jpg"></div>
      </a>
      <a href="pandagenda/pandagenda.html" class="card">
        <div class="card-info"><div class="card-title">PandAgenda</div><div class="color-line c5"></div></div>
        <div class="card-img"><img src="img/pandagenda.jpg"></div>
      </a>
      <a href="doccelunghe/doccelunghe.html" class="card">
        <div class="card-info"><div class="card-title">Doccelunghe</div><div class="color-line c6"></div></div>
        <div class="card-img"><img src="img/doccelunghe.jpg"></div>
      </a>
      <a href="fotoalbum/fotoalbum.html" class="card">
        <div class="card-info"><div class="card-title">Fotoalbum</div><div class="color-line c7"></div></div>
        <div class="card-img"><img src="img/fotoalbum.jpg"></div>
      </a>
      <a href="pandavideo/pandavideo.html" class="card">
        <div class="card-info"><div class="card-title">Pandavideo</div><div class="color-line c8"></div></div>
        <div class="card-img"><img src="img/pandavideo.jpg"></div>
      </a>
      <a href="Pandamusic/pandamusic.html" class="card">
        <div class="card-info"><div class="card-title">PandaMusic</div><div class="color-line c9"></div></div>
        <div class="card-img"><img src="img/pandamusic.jpg"></div>
      </a>
    </section>

    <div class="section-divider"></div>

    <section class="timer-section">
      <h2>Stiamo insieme da...</h2>
      <div class="timer-wrap">
        <div class="pulse-wrapper">
          <div class="heart-flip" id="f1">
            <div class="heart-front"><span class="val" id="years">0</span><span class="lbl">Anni</span></div>
            <div class="heart-back">T</div>
          </div>
        </div>
        <div class="pulse-wrapper">
          <div class="heart-flip" id="f2">
            <div class="heart-front"><span class="val" id="months">0</span><span class="lbl">Mesi</span></div>
            <div class="heart-back">V</div>
          </div>
        </div>
        <div class="pulse-wrapper">
          <div class="heart-flip" id="f3">
            <div class="heart-front"><span class="val" id="days">0</span><span class="lbl">Giorni</span></div>
            <div class="heart-back">B</div>
          </div>
        </div>
      </div>
      <div id="anniversary-msg"></div>
    </section>

    <div class="section-divider"></div>

  </main>

  <footer>
    @SbatuffoBlog 2026
  </footer>

  <script>
    /* --- SOTTOTITOLO RANDOM --- */
    const frasi = [
      "ti sbatuffoblog intensamente", "ti sbatuffoblog pandosamente", 
      "ti sbatuffoblog creativamente", "ti sbatuffoblog amorevolmente", 
      "ti sbatuffoblog coccolosamente", "ti sbatuffoblog doccialungamente", 
      "ti sbatuffoblog girettosamente", "ti sbatuffoblog ovunquemente", 
      "ti sbatuffoblog insistentemente", "ti sbatuffoblog incessantemente", 
      "ti sbatuffoblog infinitamente"
    ];
    document.getElementById('dynamic-subtitle').innerText = frasi[Math.floor(Math.random() * frasi.length)];

    /* --- FUOCHI D'ARTIFICIO --- */
    function createParticle(x, y) {
      const p = document.createElement('div');
      p.classList.add('firework-particle');
      const size = Math.random() * 4 + 3;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      const colors = ['#ff4d4d', '#ffde59', '#bde0fe', '#0000ff', '#ffd700', '#ffffff'];
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      document.body.appendChild(p);

      const angle = Math.random() * Math.PI * 2;
      const velocity = Math.random() * 100 + 40;
      p.animate([
        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
        { transform: `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity + 50}px) scale(0)`, opacity: 0 }
      ], {
        duration: 3500 + Math.random() * 2000,
        easing: 'cubic-bezier(0.1, 0.5, 0.2, 1)'
      }).onfinish = () => p.remove();
    }

    function burst(id) {
      const el = document.getElementById(id);
      if(!el) return;
      const rect = el.getBoundingClientRect();
      for (let i = 0; i < 20; i++) createParticle(rect.left + rect.width/2, rect.top + rect.height/2);
    }

    setTimeout(() => {
      setInterval(() => { burst('h-left'); burst('h-right'); }, 1500);
    }, 750);

    /* --- SLIDER --- */
    const imgs = document.querySelectorAll('.slider-box img');
    let idx = 0;
    setInterval(() => {
      imgs[idx].classList.remove('active');
      idx = (idx + 1) % imgs.length;
      imgs[idx].classList.add('active');
    }, 4000);

    /* --- TIMER & ANNIVERSARI --- */
    function updateTimer() {
      const start = new Date(2018, 7, 20); // 20 Agosto 2018
      const now = new Date();
      let years = now.getFullYear() - start.getFullYear();
      let months = now.getMonth() - start.getMonth();
      let days = now.getDate() - start.getDate();
      
      if (days < 0) { 
        months--; 
        const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate(); 
        days += lastMonth; 
      }
      if (months < 0) { 
        years--; 
        months += 12; 
      }

      document.getElementById("years").innerText = years;
      document.getElementById("months").innerText = months;
      document.getElementById("days").innerText = days;

      // Logica Messaggi Anniversario
      const msgBox = document.getElementById("anniversary-msg");
      if (months === 0 && days === 0) {
        msgBox.innerHTML = "Oggi è il nostro anniversario! <3";
      } else if (days === 0) {
        msgBox.innerHTML = "Oggi è il nostro anniversario mese!";
      } else {
        msgBox.innerHTML = "";
      }
    }
    updateTimer();

    /* --- FLIP TVB (Durata 2 pulsazioni = 3 secondi) --- */
    const hearts = [document.getElementById('f1'), document.getElementById('f2'), document.getElementById('f3')];
    function triggerFlip() {
      hearts.forEach((h, i) => {
        setTimeout(() => {
          h.classList.add('flipped');
          // 3000ms corrispondono a due cicli di animazione heartbeat (1.5s * 2)
          setTimeout(() => h.classList.remove('flipped'), 3000);
        }, i * 300); 
      });
    }
    setInterval(triggerFlip, 8000);
    setTimeout(triggerFlip, 1500);
  </script>
</body>
</html>
