<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SbatuffoBlog - Home</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Grandstander:wght@600;900&family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --main-blue: #0000ff;
      --light-blue-border: #bde0fe;
      --bg-soft: #fdfdfd;
      --heart-red: #ff4d4d;
    }

    body {
      margin: 0;
      font-family: 'Fredoka', sans-serif;
      background-color: var(--bg-soft);
      color: #222;
      overflow-x: hidden;
    }

    /* --- HEADER --- */
    header {
      padding: 30px 10px;
      text-align: center;
      background: #fff;
      border-bottom: 2px solid var(--light-blue-border);
    }

    .header-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    .side-heart {
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: var(--heart-red);
      animation: heartbeat 1.5s infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .brand-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand-title {
      /* Font Grandstander: Molto più elegante del Luckiest Guy, mantiene lo stile comic ma con classe */
      font-family: 'Grandstander', cursive;
      font-weight: 900;
      font-size: clamp(2rem, 7vw, 3.8rem);
      color: var(--main-blue);
      position: relative;
      display: inline-block;
      overflow: hidden;
      margin: 0;
      letter-spacing: -1px; /* Stringe leggermente le lettere per un look più moderno */
      line-height: 1;
    }

    .brand-title::after {
      content: "";
      position: absolute;
      top: 0;
      left: -150%;
      width: 60%;
      height: 100%;
      background: linear-gradient(to right, transparent 0%, rgba(255, 255, 255, 0.6) 50%, transparent 100%);
      transform: skewX(-25deg);
      animation: slowReflect 3s infinite linear;
    }

    .brand-subtitle {
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      color: var(--light-blue-border);
      font-weight: 700;
      margin-top: 8px;
      letter-spacing: 1.5px;
      text-transform: lowercase; /* Rende il tutto più "morbido" ed elegante */
    }

    @keyframes slowReflect {
      0% { left: -150%; }
      70% { left: 150%; } 
      100% { left: 150%; } 
    }

    /* --- SLIDER --- */
    .slider-box {
      width: 94%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      margin: 25px auto;
      overflow: hidden;
      border-radius: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      position: relative;
    }
    .slider-box img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; opacity: 0; transition: opacity 1.2s;
    }
    .slider-box img.active { opacity: 1; }

    /* --- GRID CARD --- */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 10px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 15px;
      border: 1.5px solid var(--light-blue-border);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
    }
    .card:hover { transform: translateY(-3px); border-color: var(--main-blue); }
    .card-info { padding: 12px 5px 0 5px; text-align: center; }
    .card-title { font-weight: 700; font-size: clamp(0.65rem, 2.5vw, 0.95rem); text-transform: uppercase; margin-bottom: 4px; }
    .color-line { height: 4px; width: 25px; margin: 0 auto 10px; border-radius: 10px; }
    
    .c1 { background: #ff5e5e; } .c2 { background: #5eb5ff; } .c3 { background: #ffde59; }
    .c4 { background: #002147; } .c5 { background: #55efc4; } .c6 { background: #fab1a0; }
    .c7 { background: #fd79a8; } .c8 { background: #00cec9; } .c9 { background: #a29bfe; }

    .card-img { width: 100%; aspect-ratio: 1.3 / 1; overflow: hidden; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }

    /* --- DIVISORE --- */
    .section-divider {
      max-width: 200px;
      height: 3px;
      background: var(--light-blue-border);
      margin: 60px auto 30px;
      border-radius: 50px;
      position: relative;
    }
    .section-divider::after {
      content: "♥";
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-soft);
      padding: 0 15px;
      color: var(--heart-red);
      font-size: 1.5rem;
    }

    /* --- TIMER SECTION --- */
    .timer-section {
      text-align: center;
      padding: 10px 10px 80px;
    }

    .timer-wrap {
      display: flex;
      justify-content: center;
      gap: 15px;
      perspective: 1000px;
      padding: 20px 0;
    }

    .heart-flip {
      width: 100px;
      height: 100px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .heart-flip.flipped { transform: rotateY(180deg); }

    .heart-front, .heart-back {
      position: absolute;
      width: 100%; height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #eff7ff;
      clip-path: path('M50 90 C 20 70, 5 55, 5 35 C 5 20, 20 10, 35 10 C 43 10, 47 15, 50 18 C 53 15, 57 10, 65 10 C 80 10, 95 20, 95 35 C 95 55, 80 70, 50 90');
    }

    .heart-back {
      background: var(--main-blue);
      color: #fff;
      transform: rotateY(180deg);
      font-family: 'Grandstander', cursive;
      font-size: 2.2rem;
    }

    .val { 
      font-size: 1.6rem; 
      font-weight: 700; 
      color: var(--main-blue); 
      margin-top: -5px;
      line-height: 1;
    }
    .lbl { 
      font-size: 0.65rem; 
      text-transform: uppercase; 
      font-weight: 700; 
      color: #888;
    }

    @media (max-width: 450px) {
      .timer-wrap { gap: 8px; }
      .heart-flip { width: 85px; height: 85px; }
      .val { font-size: 1.4rem; }
      .lbl { font-size: 0.55rem; }
      .heart-back { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <div class="side-heart">♥</div>
      <div class="brand-wrapper">
        <h1 class="brand-title">SbatuffoBlog</h1>
        <div class="brand-subtitle">Pandosamente insieme</div>
      </div>
      <div class="side-heart">♥</div>
    </div>
  </header>

  <main>
    <section class="slider-box">
      <img src="img/ioete1.jpg" alt="1" class="active">
      <img src="img/ioete2.jpg" alt="2">
      <img src="img/ioete3.jpg" alt="3">
    </section>

    <section class="grid-container">
      <a href="fotopuzzle/fotopuzzle.html" class="card">
        <div class="card-info"><div class="card-title">Fotopuzzle</div><div class="color-line c1"></div></div>
        <div class="card-img"><img src="img/fotopuzzle.jpg"></div>
      </a>
      <a href="girettimap/girettimap.html" class="card">
        <div class="card-info"><div class="card-title">Giretti</div><div class="color-line c2"></div></div>
        <div class="card-img"><img src="img/girettimap.jpg"></div>
      </a>
      <a href="pandaccessori/pandaccessori.html" class="card">
        <div class="card-info"><div class="card-title">Pandaccessori</div><div class="color-line c3"></div></div>
        <div class="card-img"><img src="img/pandaccessori.jpg"></div>
      </a>
      <a href="pandosita/pandosita.html" class="card">
        <div class="card-info"><div class="card-title">Pandosità</div><div class="color-line c4"></div></div>
        <div class="card-img"><img src="img/pandosita.jpg"></div>
      </a>
      <a href="pandagenda/pandagenda.html" class="card">
        <div class="card-info"><div class="card-title">PandAgenda</div><div class="color-line c5"></div></div>
        <div class="card-img"><img src="img/pandagenda.jpg"></div>
      </a>
      <a href="doccelunghe/doccelunghe.html" class="card">
        <div class="card-info"><div class="card-title">Doccelunghe</div><div class="color-line c6"></div></div>
        <div class="card-img"><img src="img/doccelunghe.jpg"></div>
      </a>
      <a href="fotoalbum/fotoalbum.html" class="card">
        <div class="card-info"><div class="card-title">Fotoalbum</div><div class="color-line c7"></div></div>
        <div class="card-img"><img src="img/fotoalbum.jpg"></div>
      </a>
      <a href="pandavideo/pandavideo.html" class="card">
        <div class="card-info"><div class="card-title">Pandavideo</div><div class="color-line c8"></div></div>
        <div class="card-img"><img src="img/pandavideo.jpg"></div>
      </a>
      <a href="Pandamusic/pandamusic.html" class="card">
        <div class="card-info"><div class="card-title">PandaMusic</div><div class="color-line c9"></div></div>
        <div class="card-img"><img src="img/pandamusic.jpg"></div>
      </a>
    </section>

    <div class="section-divider"></div>

    <section class="timer-section">
      <h2 style="font-family: 'Grandstander'; color: var(--main-blue); margin-bottom: 35px; font-size: 1.6rem;">Stiamo insieme da...</h2>
      <div class="timer-wrap">
        <div class="heart-flip" id="f1">
          <div class="heart-front"><span class="val" id="years">0</span><span class="lbl">Anni</span></div>
          <div class="heart-back">T</div>
        </div>
        <div class="heart-flip" id="f2">
          <div class="heart-front"><span class="val" id="months">0</span><span class="lbl">Mesi</span></div>
          <div class="heart-back">V</div>
        </div>
        <div class="heart-flip" id="f3">
          <div class="heart-front"><span class="val" id="days">0</span><span class="lbl">Giorni</span></div>
          <div class="heart-back">B</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const imgs = document.querySelectorAll('.slider-box img');
    let idx = 0;
    setInterval(() => {
      imgs[idx].classList.remove('active');
      idx = (idx + 1) % imgs.length;
      imgs[idx].classList.add('active');
    }, 4000);

    function updateTimer() {
      const start = new Date(2018, 7, 20);
      const now = new Date();
      let years = now.getFullYear() - start.getFullYear();
      let months = now.getMonth() - start.getMonth();
      let days = now.getDate() - start.getDate();
      if (days < 0) {
        months--;
        const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
        days += lastMonth;
      }
      if (months < 0) {
        years--;
        months += 12;
      }
      document.getElementById("years").innerText = years;
      document.getElementById("months").innerText = months;
      document.getElementById("days").innerText = days;
    }

    updateTimer();
    setInterval(updateTimer, 3600000);

    const hearts = [document.getElementById('f1'), document.getElementById('f2'), document.getElementById('f3')];
    function triggerFlip() {
      hearts.forEach((h, i) => {
        setTimeout(() => {
          h.classList.add('flipped');
          setTimeout(() => h.classList.remove('flipped'), 3000);
        }, i * 300);
      });
    }
    setInterval(triggerFlip, 7000);
    setTimeout(triggerFlip, 1000);
  </script>
</body>
</html>
