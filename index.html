<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Ti Sbatuffolo</title>
  <link rel="stylesheet" href="stile.css">
  <style>
    /* Layout per far rimanere il footer in basso */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }
    main {
      flex: 1;
    }

    /* Slider "io&te" */
    .ioete-container {
      text-align: center;
      margin-bottom: 20px;
    }
    .ioete-slider {
      width: 80%;
      max-width: 800px;
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .ioete-slider img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    .ioete-slider img.active {
      opacity: 1;
    }

    /* Griglia 3x3 */
    .grid-riquadri {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 0 20px 20px 20px;
    }
    .riquadro {
      text-align: center;
    }
    .riquadro img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1 style="text-align:center;">
      <a href="index.html" class="home-link">❤ Ti SbatuffoBlog ❤</a>
    </h1>
    <nav>
      <!-- In futuro puoi aggiungere altre pagine qui -->
    </nav>
  </header>

  <main>
    <!-- Sezione "io&te" con slider -->
    <section class="ioete-container">
      <h2>io&te</h2>
      <div class="ioete-slider">
        <img src="img/ioete1.jpg" alt="io&te 1" class="active">
        <img src="img/ioete2.jpg" alt="io&te 2">
        <img src="img/ioete3.jpg" alt="io&te 3">
        <img src="img/ioete4.jpg" alt="io&te 4">
      </div>
    </section>

    <!-- Card 3x3 -->
    <section class="grid-riquadri">
      <div class="riquadro">
        <a href="fotopuzzle/fotopuzzle.html" class="riquadro-link">
          <div class="riquadro-titolo">Fotopuzzle</div>
          <img src="img/fotopuzzle.jpg" alt="Fotopuzzle">
        </a>
      </div>
      <div class="riquadro">
        <a href="girettimap/girettimap.html" class="riquadro-link">
          <div class="riquadro-titolo">GirettiMap</div>
          <img src="img/girettimap.jpg" alt="GirettiMap">
        </a>
      </div>
      <div class="riquadro">
        <a href="pandaccessori/pandaccessori.html" class="riquadro-link">
          <div class="riquadro-titolo">Pandaccessori</div>
          <img src="img/pandaccessori.jpg" alt="Pandaccessori">
        </a>
      </div>

      <div class="riquadro">
        <a href="pandosita/pandosita.html" class="riquadro-link">
          <div class="riquadro-titolo">Pandosità</div>
          <img src="img/pandosita.jpg" alt="Pandosità">
        </a>
      </div>
      <div class="riquadro">
        <a href="pandagenda/pandagenda.html" class="riquadro-link">
          <div class="riquadro-titolo">Pandagenda</div>
          <img src="img/pandagenda.jpg" alt="Pandagenda">
        </a>
      </div>
      <div class="riquadro">
        <a href="doccelunghe/doccelunghe.html" class="riquadro-link">
          <div class="riquadro-titolo">Doccelunghe</div>
          <img src="img/doccelunghe.jpg" alt="Doccelunghe">
        </a>
      </div>

      <div class="riquadro">
        <a href="fotoalbum/fotoalbum.html" class="riquadro-link">
          <div class="riquadro-titolo">Fotoalbum</div>
          <img src="img/fotoalbum.jpg" alt="Fotoalbum">
        </a>
      </div>
      <div class="riquadro">
        <a href="pandavideo/pandavideo.html" class="riquadro-link">
          <div class="riquadro-titolo">Pandavideo</div>
          <img src="img/pandavideo.jpg" alt="Test8">
        </a>
      </div>
      <div class="riquadro">
        <a href="test9/test9.html" class="riquadro-link">
          <div class="riquadro-titolo">Test9</div>
          <img src="img/test9.jpg" alt="Test9">
        </a>
      </div>
    </section>
  </main>

  <footer>
    © 2026 Ti SbatuffoBlog  
  </footer>

  <script>
    // Script slider "io&te"
    const slides = document.querySelectorAll('.ioete-slider img');
    let current = 0;
    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 3000); // cambia immagine ogni 3 secondi
  </script>
</body>
</html>
